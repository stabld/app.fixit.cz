<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixit App | Klientský a Řemeslnický portál</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        fixit: { 
                            50: '#fffbeb', 100: '#fef3c7', 500: '#f59e0b', 
                            600: '#d97706', 700: '#b45309', dark: '#020617', slate: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        
        .glass-panel { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.85); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animace */
        .view-transition { transition: opacity 0.4s ease, transform 0.4s ease; }
        .view-hidden { opacity: 0; transform: translateY(10px); pointer-events: none; position: absolute; width: 100%; z-index: -1; }
        .view-active { opacity: 1; transform: translateY(0); position: relative; z-index: 10; }
        
        .fade-enter { opacity: 0; transition: opacity 0.3s ease-in-out; }
        .fade-enter-active { opacity: 1; }
        
        .nav-item.active { background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .dark .nav-item.active { background-color: rgba(245, 158, 11, 0.2); }
    </style>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }
    </script>
</head>
<body class="antialiased bg-slate-50 text-slate-900 dark:bg-fixit-dark dark:text-white h-screen overflow-hidden relative">

        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl border border-slate-200 dark:border-slate-800 p-8 md:p-12 relative z-10 overflow-hidden">
            
            <div class="flex justify-center items-center gap-3 mb-8">
                <div class="w-14 h-14 relative flex items-center justify-center">
                    <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none">
                        <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                        <circle cx="50" cy="48" r="16" class="fill-white dark:fill-slate-900"/>
                        <path d="M40 58 L30 68 L45 64 Z" class="fill-white dark:fill-slate-900"/>
                    </svg>
                </div>
                <span class="font-extrabold text-4xl tracking-tighter text-slate-900 dark:text-white">Fixit</span>
            </div>

            <div class="relative">
                <div id="view-role-select" class="view-transition view-active">
                    <h2 class="text-2xl md:text-3xl font-extrabold mb-2 text-center text-slate-900 dark:text-white">Vítejte v aplikaci</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-center mb-10 text-lg">Vyberte, jak chcete Fixit používat</p>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <button onclick="window.goToAuth('customer')" class="group bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-fixit-500 dark:hover:border-fixit-500 rounded-[2rem] p-8 flex flex-col items-center gap-4 transition-all hover:-translate-y-1 hover:shadow-xl text-center relative overflow-hidden">
                            <div class="w-20 h-20 bg-white dark:bg-slate-700 text-fixit-500 rounded-2xl flex items-center justify-center text-3xl group-hover:bg-fixit-500 group-hover:text-white transition-all shadow-sm">
                                <i class="fa-solid fa-house-chimney-window"></i>

                            <div>
                                <h3 class="font-extrabold text-xl text-slate-900 dark:text-white mb-2">Vstoupit jako poptávající</h3>

                            </div>
                        </button>
                        <button onclick="window.goToAuth('craftsman')" class="group bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-fixit-500 dark:hover:border-fixit-500 rounded-[2rem] p-8 flex flex-col items-center gap-4 transition-all hover:-translate-y-1 hover:shadow-xl text-center relative overflow-hidden">
                            <div class="w-20 h-20 bg-white dark:bg-slate-700 text-slate-400 group-hover:bg-fixit-500 group-hover:text-white transition-all rounded-2xl flex items-center justify-center text-3xl shadow-sm">
                                <i class="fa-solid fa-toolbox"></i>
                            </div>
                            <div>
                                <h3 class="font-extrabold text-xl text-slate-900 dark:text-white mb-2">Vstoupit jako řemeslník</h3>
                                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">Jsem profík a chci získat přístup k novým zakázkám v okolí.</p>
                            </div>
                        </button>
                    </div>
                </div>

                <div id="view-auth-form" class="view-transition view-hidden max-w-md mx-auto">
                    <button onclick="window.goBackToRoles()" class="text-sm font-bold text-slate-500 hover:text-fixit-500 transition mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Zpět na výběr
                    </button>

                    <div class="bg-fixit-50 dark:bg-fixit-500/10 border border-fixit-500/30 rounded-xl p-4 mb-6 flex items-center justify-center gap-3 text-fixit-700 dark:text-fixit-400 font-bold">
                        <i id="selected-role-icon" class="fa-solid fa-house"></i>
                        <span id="selected-role-text">Přihlašujete se jako Zákazník</span>

                    <div class="bg-slate-100 dark:bg-slate-800 p-1.5 rounded-2xl flex relative mb-8">
                        <button onclick="window.switchAuthTab('login')" id="btn-tab-login" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all z-10 text-slate-900 dark:text-white">Přihlášení</button>
                        <button onclick="window.switchAuthTab('register')" id="btn-tab-register" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all z-10 text-slate-500">Registrace</button>
                        <div id="auth-slider" class="absolute top-1.5 left-1.5 w-[calc(50%-6px)] h-[calc(100%-12px)] bg-white dark:bg-slate-700 rounded-xl shadow-sm transition-transform duration-300"></div>

                    <div id="auth-error" class="hidden mb-4 p-4 bg-red-50 dark:bg-red-500/10 border border-red-500/20 text-red-600 dark:text-red-400 rounded-xl text-sm font-bold text-center"></div>
                    <div id="auth-success" class="hidden mb-4 p-4 bg-green-50 dark:bg-green-500/10 border border-green-500/20 text-green-600 dark:text-green-400 rounded-xl text-sm font-bold text-center"></div>

                    <div id="form-login">
                        <form onsubmit="window.handleLogin(event)">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">E-mail</label>
                                    <input type="email" id="log-email" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="vas@email.cz">
                                </div>
                                <div>
                                    <div class="flex justify-between items-center mb-2">
                                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400">Heslo</label>
                                        <a href="#" class="text-xs text-fixit-600 dark:text-fixit-500 font-bold hover:underline">Zapomenuté heslo?</a>
                                    </div>
                                    <input type="password" id="log-password" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="••••••••">
                                </div>
                            </div>
                            <button type="submit" id="btn-submit-login" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-4 rounded-xl mt-6 transition shadow-lg hover:scale-[1.02]">
                                Přihlásit se
                            </button>
                        </form>
                    </div>

                    <div id="form-register" class="hidden">
                        <form onsubmit="window.handleRegister(event)">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Jméno a příjmení / Název firmy</label>
                                    <input type="text" id="reg-name" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="Jan Novák">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">E-mail</label>
                                    <input type="email" id="reg-email" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="vas@email.cz">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Heslo (min. 6 znaků)</label>
                                    <input type="password" id="reg-password" required minlength="6" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="••••••••">
                                </div>
                            </div>
                            <button type="submit" id="btn-submit-register" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-4 rounded-xl mt-6 transition shadow-lg hover:scale-[1.02]">
                                Vytvořit účet
                            </button>
                        </form>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>


    <div id="main-app" class="flex h-screen w-full hidden opacity-0 transition-opacity duration-500">
        
        <aside class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between flex-shrink-0 z-50">
            <div>
                <div class="h-20 flex items-center px-8 border-b border-slate-200 dark:border-slate-800 cursor-pointer">
                    <div class="w-10 h-10 relative flex items-center justify-center mr-3">
                        <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none">
                            <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                            <circle cx="50" cy="48" r="16" class="fill-white dark:fill-slate-900"/>
                            <path d="M40 58 L30 68 L45 64 Z" class="fill-white dark:fill-slate-900"/>

                    </div>
                    <span class="font-extrabold text-2xl tracking-tighter dark:text-white">Fixit</span>

            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <button onclick="window.logout()" class="w-full mb-4 px-4 py-2 rounded-xl text-sm font-bold text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Odhlásit se
                </button>
                <div class="flex items-center gap-3 w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700">
                    <div class="w-10 h-10 rounded-full bg-fixit-100 overflow-hidden shrink-0">
                        <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=f59e0b" alt="User">
                    </div>
                    <div class="text-left truncate">
                        <p class="text-sm font-bold text-slate-900 dark:text-white leading-tight" id="user-name">Jan Novák</p>
                        <p class="text-xs text-slate-500 font-medium" id="user-role-label">Zákazník</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden relative bg-slate-50 dark:bg-fixit-dark">
            <header class="h-20 glass-panel flex items-center justify-between px-8 z-40 sticky top-0">
                <h1 class="text-2xl font-extrabold" id="header-title">Nástěnka</h1>
                <div class="flex items-center gap-4">

    <div id="modal-payment-success" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl max-w-md w-full text-center shadow-2xl transform scale-90 transition-transform duration-300" id="modal-payment-box">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center text-white text-4xl mx-auto mb-6 shadow-lg shadow-green-500/30">
                <i class="fa-solid fa-check"></i>
            </div>
            <h3 class="text-2xl font-extrabold mb-2">Peníze jsou v úschově!</h3>
            <p class="text-slate-500 mb-8 leading-relaxed">Částka 1 200 Kč byla rezervována z vaší karty. Řemeslník Karel V. dostal zprávu, že může vyrazit.</p>
            <button onclick="window.closePaymentModal()" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-4 rounded-xl hover:bg-fixit-500 transition">Zpět na Nástěnku</button>
        </div>
    </div>


    <script>
        // ==========================================
        // 1. SUPABASE INICIALIZACE (Vlož své údaje!)
        // ==========================================
        const supabaseUrl = 'https://iyvvwsnhezjrjrkscbyc.supabase.co'; 
        const supabaseKey = 'sb_publishable_OehKo_l9qTAp-xfmlHpzOA_OYBp4ouc';
        
        let supabaseClient = null;
        try {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
            }
        } catch (e) { console.error("Chyba Supabase:", e); }

        // ==========================================
        // 2. AUTH LOGIKA (Přihlašování / Vstup)
        // ==========================================
        window.activeRole = 'customer'; 

        window.goToAuth = function(role) {
            window.activeRole = role; 
            const iconEl = document.getElementById('selected-role-icon');
            const textEl = document.getElementById('selected-role-text');
            if(role === 'customer') {
                iconEl.className = 'fa-solid fa-house-chimney-window';
                textEl.innerText = 'Pokračujete jako Zákazník';
            } else {
                iconEl.className = 'fa-solid fa-toolbox';
                textEl.innerText = 'Pokračujete jako Řemeslník';
            }
            document.getElementById('view-role-select').classList.replace('view-active', 'view-hidden');
            document.getElementById('view-auth-form').classList.replace('view-hidden', 'view-active');
            window.clearMessages();
            window.switchAuthTab('login');
        };

        window.goBackToRoles = function() {
            document.getElementById('view-auth-form').classList.replace('view-active', 'view-hidden');
            document.getElementById('view-role-select').classList.replace('view-hidden', 'view-active');
            window.clearMessages();
        };

        window.switchAuthTab = function(tab) {
            window.clearMessages();
            const slider = document.getElementById('auth-slider');
            const btnLogin = document.getElementById('btn-tab-login');
            const btnRegister = document.getElementById('btn-tab-register');
            const formLogin = document.getElementById('form-login');
            const formRegister = document.getElementById('form-register');

            if (tab === 'login') {
                slider.style.transform = 'translateX(0)';
                btnLogin.classList.add('text-slate-900', 'dark:text-white');
                btnLogin.classList.remove('text-slate-500');
                btnRegister.classList.add('text-slate-500');
                btnRegister.classList.remove('text-slate-900', 'dark:text-white');
                formLogin.classList.remove('hidden');
                formRegister.classList.add('hidden');
            } else {
                slider.style.transform = 'translateX(100%)';
                btnRegister.classList.add('text-slate-900', 'dark:text-white');
                btnRegister.classList.remove('text-slate-500');
                btnLogin.classList.add('text-slate-500');
                btnLogin.classList.remove('text-slate-900', 'dark:text-white');
                formRegister.classList.remove('hidden');
                formLogin.classList.add('hidden');
            }
        };

        window.showError = function(msg) {
            const box = document.getElementById('auth-error');
            box.innerText = msg;
            box.classList.remove('hidden');
            document.getElementById('auth-success').classList.add('hidden');
        };

        window.showSuccess = function(msg) {
            const box = document.getElementById('auth-success');
            box.innerText = msg;
            box.classList.remove('hidden');
            document.getElementById('auth-error').classList.add('hidden');
        };

        window.clearMessages = function() {
            document.getElementById('auth-error').classList.add('hidden');
            document.getElementById('auth-success').classList.add('hidden');
        };

        window.handleRegister = async function(e) {
            e.preventDefault();
            window.clearMessages();
            if (!supabaseClient) return window.showError("Nepodařilo se připojit k databázi.");

            const btn = document.getElementById('btn-submit-register');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Vytvářím účet...';
            btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: document.getElementById('reg-email').value,
                    password: document.getElementById('reg-password').value,
                    options: { data: { full_name: document.getElementById('reg-name').value, role: window.activeRole } }
                });
                if (error) throw error;
                window.showSuccess("Registrace byla úspěšná! Nyní se přihlaste.");
                setTimeout(() => { window.switchAuthTab('login'); }, 2000);
            } catch (err) { window.showError("Chyba při registraci: " + err.message); } 
            finally { btn.innerHTML = originalText; btn.disabled = false; }
        };

        window.handleLogin = async function(e) {
            e.preventDefault();
            window.clearMessages();
            if (!supabaseClient) return window.showError("Nepodařilo se připojit k databázi.");

            const btn = document.getElementById('btn-submit-login');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Přihlašuji...';
            btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: document.getElementById('log-email').value,
                    password: document.getElementById('log-password').value,
                });
                if (error) throw error;

                window.showSuccess("Úspěšně přihlášeno! Spouštím aplikaci...");
                
                // === SPOUŠTĚNÍ APLIKACE PO PŘIHLÁŠENÍ ===
                const userRole = data.user.user_metadata?.role || 'customer';
                const userName = data.user.user_metadata?.full_name || 'Uživatel';
                
                setTimeout(() => {
                    const authScreen = document.getElementById('auth-screen');
                    const mainApp = document.getElementById('main-app');
                    
                    authScreen.style.opacity = '0'; // Zmizení přihlašování
                    setTimeout(() => {
                        authScreen.classList.add('hidden');
                        
                        // Inicializujeme aplikaci s daty z databáze
                        window.initApp(userRole, userName);
                        
                        mainApp.classList.remove('hidden');
                        void mainApp.offsetWidth; // Reflow hack
                        mainApp.style.opacity = '1'; // Zobrazení aplikace
                    }, 500);
                }, 1000);

            } catch (err) { window.showError("Špatný e-mail nebo heslo."); } 
            finally { btn.innerHTML = originalText; btn.disabled = false; }
        };

        window.logout = async function() {
            if(supabaseClient) await supabaseClient.auth.signOut();
            window.location.reload(); 
        };

        // ==========================================
        // 3. LOGIKA APLIKACE (Nástěnka, Poptávky...)
        // ==========================================
        const appStructure = {
            customer: {
                nav: [
                    { id: 'c-dashboard', icon: 'fa-house', text: 'Nástěnka' },
                    { id: 'c-requests', icon: 'fa-list-check', text: 'Moje poptávky' },
                    { id: 'c-messages', icon: 'fa-comment-dots', text: 'Zprávy', badge: true },
                    { id: 'c-payments', icon: 'fa-shield-halved', text: 'Platby & Escrow' },
                    { id: 'c-new', icon: 'fa-plus', text: 'Nová poptávka', hidden: true }
                ],
                roleLabel: 'Zákazník',
                seed: 'Felix',
                cta: `<button onclick="window.switchAppTab('c-new', 'Nová poptávka')" class="bg-fixit-500 hover:bg-fixit-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition hover:scale-105 text-sm flex items-center gap-2"><i class="fa-solid fa-plus"></i> Nová poptávka</button>`
            },
            craftsman: {
                nav: [
                    { id: 'r-market', icon: 'fa-map-location-dot', text: 'Tržiště zakázek' },
                    { id: 'r-jobs', icon: 'fa-hammer', text: 'Moje práce' },
                    { id: 'r-messages', icon: 'fa-comment-dots', text: 'Zprávy' },
                    { id: 'r-earnings', icon: 'fa-wallet', text: 'Výdělky' }
                ],
                roleLabel: 'Řemeslník',
                seed: 'Karel',
                cta: `<div class="bg-green-100 text-green-600 dark:bg-green-500/20 dark:text-green-400 px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2"><i class="fa-solid fa-toggle-on"></i> Jsem online</div>`
            }
        };

        window.initApp = function(role, name) {
            const config = appStructure[role];

            document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${config.seed}&backgroundColor=${role === 'customer' ? 'f59e0b' : '0f172a'}`;
            
            document.getElementById('header-cta-container').innerHTML = config.cta;

            // Vygenerování levého menu
            const navHtml = config.nav.filter(item => !item.hidden).map(item => `
                <button onclick="window.switchAppTab('${item.id}', '${item.text}')" id="nav-${item.id}" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold transition hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">

                    </div>
                    ${item.text}
                </button>
            `).join('');
            document.getElementById('main-nav').innerHTML = navHtml;

            // Vykreslení HTML kódu Nástěnek
            document.getElementById('views-container').innerHTML = role === 'customer' ? window.getCustomerHTML(name) : window.getCraftsmanHTML();
            
            // Přepneme na úvodní záložku
            window.switchAppTab(config.nav[0].id, config.nav[0].text);
        };

        window.switchAppTab = function(tabId, title) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.add('hidden'); el.classList.remove('fade-enter-active');
            });
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active', 'text-slate-900', 'dark:text-white');
                el.classList.add('text-slate-600', 'dark:text-slate-400');
            });

            const activeView = document.getElementById(`view-${tabId}`);
            if(activeView) {
                activeView.classList.remove('hidden');
                setTimeout(() => activeView.classList.add('fade-enter-active'), 10);
            }
            
            const activeNav = document.getElementById(`nav-${tabId}`);
            if (activeNav) {
                activeNav.classList.add('active', 'text-slate-900', 'dark:text-white');
                activeNav.classList.remove('text-slate-600', 'dark:text-slate-400');
            }
            if(title) document.getElementById('header-title').innerText = title;
        };

        window.simulateAI = function() {
            const input = document.getElementById('new-request-input');
            const text = input.value.trim();
            if (!text) { alert("Prosím, popište nejprve svou závadu."); input.focus(); return; }

            const btn = document.getElementById('btn-ai-generate');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-microchip fa-spin"></i> Bořek analyzuje a tvoří zadání...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Poptávka zveřejněna!';
                btn.classList.replace('bg-slate-900', 'bg-green-500');
                btn.classList.replace('hover:bg-fixit-500', 'hover:bg-green-600');
                
                let generatedTitle = text.length > 35 ? text.substring(0, 35) + '...' : text;
                generatedTitle = generatedTitle.charAt(0).toUpperCase() + generatedTitle.slice(1);

                const newRequestHTML = `
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-fixit-500 shadow-md flex items-center justify-between cursor-pointer transition animate-pulse">

                        </div>
                        <i class="fa-solid fa-chevron-right text-fixit-500"></i>
                    </div>
                `;

                if (requestsList) {
                    requestsList.insertAdjacentHTML('afterbegin', newRequestHTML);
                    setTimeout(() => { requestsList.firstElementChild.classList.remove('animate-pulse'); }, 2000);
                }

                setTimeout(() => {
                    input.value = '';
                    btn.innerHTML = originalBtnHtml;
                    btn.classList.replace('bg-green-500', 'bg-slate-900');
                    btn.classList.replace('hover:bg-green-600', 'hover:bg-fixit-500');
                    btn.disabled = false;
                    window.switchAppTab('c-requests', 'Moje poptávky'); 
                }, 1500);
            }, 2000);
        };

        // DARK MODE

            const isDark = document.documentElement.classList.contains('dark');
            if(document.getElementById('theme-toggle-dark-icon')) {
