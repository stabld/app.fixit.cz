<script>
const SB_URL = "https://iyvvwsnhezjrjrkscbyc.supabase.co";
const SB_KEY = "sb_publishable_OehKo_l9qTAp-xfmlHpzOA_OYBp4ouc";
let sb = null;
try { if (window.supabase) sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

let APP_ROLE = "customer";
let APP_USER = null;
let STATE = { requests: [], craftJobs: [] };

window.goToAuth = function(role) {
    APP_ROLE = role;
    document.getElementById("role-icon").className = role === "customer" ? "fa-solid fa-house" : "fa-solid fa-toolbox";
    document.getElementById("role-text").innerText = role === "customer" ? "Zákazník" : "Řemeslník";
    document.getElementById("view-role-select").classList.add("hidden");
    document.getElementById("view-auth-form").classList.remove("hidden");
    switchTab("login"); clearMsg();
}
window.backToRoles = function() {
    document.getElementById("view-auth-form").classList.add("hidden");
    document.getElementById("view-role-select").classList.remove("hidden");
    clearMsg();
}
window.switchTab = function(t) {
    clearMsg();
    document.getElementById("tab-slider").style.transform = t === "register" ? "translateX(100%)" : "translateX(0)";
    document.getElementById("btn-login").classList.toggle("text-slate-500", t !== "login");
    document.getElementById("btn-reg").classList.toggle("text-slate-500", t !== "register");
    document.getElementById("form-login").classList.toggle("hidden", t !== "login");
    document.getElementById("form-reg").classList.toggle("hidden", t !== "register");
}
function showErr(m) { const e = document.getElementById("auth-error"); e.innerText = m; e.classList.remove("hidden"); document.getElementById("auth-ok").classList.add("hidden"); }
function showOk(m) { const e = document.getElementById("auth-ok"); e.innerText = m; e.classList.remove("hidden"); document.getElementById("auth-error").classList.add("hidden"); }
function clearMsg() { document.getElementById("auth-error").classList.add("hidden"); document.getElementById("auth-ok").classList.add("hidden"); }

window.doRegister = async function() {
    if (!sb) return showErr("Chyba připojení.");
    const btn = document.getElementById("btn-do-reg");
    btn.innerHTML = "<i class=\"fa-solid fa-circle-notch fa-spin mr-2\"></i>Vytvářím..."; btn.disabled = true;
    try {
        const { error } = await sb.auth.signUp({ email: document.getElementById("reg-email").value, password: document.getElementById("reg-pass").value, options: { data: { full_name: document.getElementById("reg-name").value, role: APP_ROLE } } });
        if (error) throw error;
        showOk("Účet vytvořen! Nyní se přihlaste.");
        setTimeout(() => switchTab("login"), 1800);
    } catch(e) { showErr("Chyba: " + e.message); }
    finally { btn.innerHTML = "Vytvořit účet"; btn.disabled = false; }
}

window.doLogin = async function() {
    if (!sb) return showErr("Chyba připojení.");
    const btn = document.getElementById("btn-do-login");
    btn.innerHTML = "<i class=\"fa-solid fa-circle-notch fa-spin mr-2\"></i>Přihlašuji..."; btn.disabled = true;
    try {
        const { data, error } = await sb.auth.signInWithPassword({ email: document.getElementById("log-email").value, password: document.getElementById("log-pass").value });
        if (error) throw error;
        showOk("Přihlášeno! Spouštím aplikaci...");
        APP_USER = data.user;
        const name = data.user.user_metadata?.full_name || "Uživatel";
        setTimeout(() => launchApp(APP_ROLE, name), 900);
    } catch(e) { showErr("Špatný e-mail nebo heslo."); }
    finally { btn.innerHTML = "Přihlásit se"; btn.disabled = false; }
}

window.doLogout = async function() { if(sb) await sb.auth.signOut(); window.location.reload(); }

window.launchApp = function(role, name) {
    const as = document.getElementById("auth-screen");
    as.style.opacity = "0"; as.style.transition = "opacity 0.4s";
    setTimeout(() => {
        as.classList.add("hidden");
        const app = document.getElementById("main-app");
        app.classList.remove("hidden"); app.style.opacity = "0";
        setTimeout(() => { app.style.transition = "opacity 0.4s"; app.style.opacity = "1"; }, 50);
        initApp(role, name);
    }, 400);
}

window.initApp = function(role, name) {
    document.getElementById("user-name").innerText = name;
    document.getElementById("user-role-lbl").innerText = role === "customer" ? "Zákazník" : "Řemeslník";
    document.getElementById("user-avatar").src = "https://api.dicebear.com/7.x/avataaars/svg?seed=" + encodeURIComponent(name) + "&backgroundColor=" + (role === "customer" ? "f59e0b" : "0f172a");
    const tt = document.getElementById("theme-toggle");
    const ui = () => { const d = document.documentElement.classList.contains("dark"); document.getElementById("theme-toggle-dark-icon").classList.toggle("hidden",d); document.getElementById("theme-toggle-light-icon").classList.toggle("hidden",!d); };
    ui(); tt.addEventListener("click", () => { document.documentElement.classList.toggle("dark"); localStorage.setItem("color-theme", document.documentElement.classList.contains("dark")?"dark":"light"); ui(); });
    if (role === "customer") initCustomer(name); else initCraftsman(name);
    setTimeout(async () => {
        if (role === "customer") { await loadCustomerRequestsFromDB(); await loadCustomerConversations(); }
        else { await loadCraftsmanJobsFromDB(); await loadCraftsmanConversations(); await loadMarketFromDB(); }
    }, 500);
}

// ===== AI NAPOJENI NA /api/gemini =====
window.callGeminiAPI = async function(parts, systemPrompt, useJson) {
    const isLocal = ["127.0.0.1","localhost"].includes(window.location.hostname) || window.location.protocol === "file:";
    if (isLocal) {
        await new Promise(r => setTimeout(r, 1500));
        if (useJson) {
            if (parts.length <= 1) return JSON.stringify({ status: "question", message: "Popište mi problém podrobněji – kde přesně je závada a jak dlouho to trvá?" });
            return JSON.stringify({ status: "done", nazev: "Testovací poptávka", kategorie: "Ukázka", popis: "Lokální testovací mód – na Vercelu bude AI plně funkční.", nalehavost: "Nízká", odhad_ceny: "0 Kč", rada: "Toto je ukázka. Na ostrém Vercelu budu analyzovat skutečný problém." });
        }
        return "Jsem Bořek v testovacím módu. Na ostrém Vercelu budu plně funkční!";
    }
    const response = await fetch("https://api-gemini-js-three.vercel.app/api/gemini", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ parts, systemPrompt, useJson })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || "HTTP " + response.status);
    return data.text;
}

let poptHistoryText = "", poptBase64 = null, poptMime = null;

window.handlePhoto = function(input) {
    const file = input.files[0]; if (!file) return;
    poptMime = file.type;
    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById("photo-preview").src = e.target.result;
        document.getElementById("photo-preview").classList.remove("hidden");
        poptBase64 = e.target.result.split(",")[1];
        document.getElementById("photo-zone").querySelector("i").classList.add("hidden");
        document.getElementById("photo-zone").querySelector("p").classList.add("hidden");
    };
    reader.readAsDataURL(file);
}

function appendChat(role, text) {

    const d = document.createElement("div");
    if (role === "user") { d.className = "poptavka-bubble-user text-sm font-medium"; d.innerText = text; }
    else { d.className = "poptavka-bubble-ai text-sm flex items-start gap-3"; d.innerHTML = "<div class=\"w-8 h-8 bg-fixit-500 rounded-full flex items-center justify-center text-white shrink-0\"><i class=\"fa-solid fa-hard-hat text-xs\"></i></div><div>" + text + "</div>"; }
    box.appendChild(d); box.scrollTop = box.scrollHeight;
}

async function processPopt(text) {
    const loading = document.getElementById("popt-loading");
    const replyArea = document.getElementById("popt-reply-area");
    loading.classList.remove("hidden"); replyArea.classList.add("hidden");
    const sp = "Jsi Bořek, profesionální technik. Vytvoř zadání pro řemeslníka.\nODPOVÍDEJ PŘESNĚ V TOMTO JSON FORMÁTU BEZ DALŠÍHO TEXTU:\n{\"status\":\"question\",\"message\":\"otázka\"} nebo {\"status\":\"done\",\"nazev\":\"titulek\",\"kategorie\":\"obor\",\"popis\":\"popis\",\"nalehavost\":\"Vysoká/Střední/Nízká\",\"odhad_ceny\":\"cena Kč\",\"rada\":\"rada\"}";
    let parts = [{text}];
    if (poptBase64 && poptMime) parts.push({inlineData:{mimeType:poptMime,data:poptBase64}});
    try {
        const raw = await window.callGeminiAPI(parts, sp, true);
        let clean = raw.replace(/```json/gi,"").replace(/```/g,"").trim();
        const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
        if (s !== -1 && e !== -1) clean = clean.substring(s, e+1);
        const d = JSON.parse(clean);
        loading.classList.add("hidden");
        if (d.status === "question") { appendChat("ai", d.message.replace(/[*]/g,"")); replyArea.classList.remove("hidden"); document.getElementById("popt-reply").focus(); }
        else if (d.status === "done") {
            document.getElementById("r-nazev").innerText = d.nazev.replace(/[*]/g,"");
            document.getElementById("r-kat").innerText = d.kategorie.replace(/[*]/g,"");
            document.getElementById("r-nal").innerText = d.nalehavost.replace(/[*]/g,"");
            document.getElementById("r-cena").innerText = d.odhad_ceny.replace(/[*]/g,"");
            document.getElementById("r-popis").innerText = d.popis.replace(/[*]/g,"");
            if (d.rada && d.rada.trim()) { document.getElementById("popt-tip-text").innerText = d.rada.replace(/[*]/g,""); document.getElementById("popt-tip").classList.remove("hidden"); }
            document.getElementById("popt-result").classList.remove("hidden");
        }
    } catch(err) { loading.classList.add("hidden"); replyArea.classList.remove("hidden"); alert("Chyba AI: " + err.message); }
}

window.startAI = function() {
    const txt = document.getElementById("popt-input").value.trim();
    if (!txt && !poptBase64) { alert("Popište závadu nebo nahrajte fotku."); return; }
    document.getElementById("popt-form").classList.add("hidden");
    document.getElementById("popt-chat").classList.remove("hidden");
    poptHistoryText = txt || "Posílám fotografii k analýze.";
    appendChat("user", poptHistoryText);
    processPopt(poptHistoryText);
}

window.replyAI = function() {
    const inp = document.getElementById("popt-reply");
    const txt = inp.value.trim();
    if (!txt) return;
    appendChat("user", txt);
    poptHistoryText += "\nUpřesnění od uživatele: " + txt;
    inp.value = "";
    processPopt(poptHistoryText);
}

window.publishRequest = async function() {
    const title = document.getElementById("r-nazev").innerText;
    const kat = document.getElementById("r-kat").innerText;
    const popis = document.getElementById("r-popis").innerText;
    const nal = document.getElementById("r-nal").innerText;
    const cena = document.getElementById("r-cena").innerText;
    if (sb && APP_USER) {
        try { await sb.from("requests").insert({ customer_id: APP_USER.id, customer_name: document.getElementById("user-name").innerText, title, category: kat, description: popis, urgency: nal, price_estimate: cena, status: "waiting" }); }
        catch(e) { console.error(e); }
    }
    const now = new Date().toLocaleTimeString("cs",{hour:"2-digit",minute:"2-digit"});
    STATE.requests.unshift({ title, kat, popis, time: now, status: "waiting" });
    refreshRequestsList(); refreshDashboard();
    poptHistoryText = ""; poptBase64 = null; poptMime = null;
    document.getElementById("popt-input").value = "";
    document.getElementById("popt-chat-msgs").innerHTML = "";
    document.getElementById("photo-preview").classList.add("hidden");
    document.getElementById("photo-zone").querySelector("i").classList.remove("hidden");
    document.getElementById("photo-zone").querySelector("p").classList.remove("hidden");
    ["popt-result","popt-tip","popt-chat"].forEach(id => document.getElementById(id)?.classList.add("hidden"));
    document.getElementById("popt-form").classList.remove("hidden");
    goTab("requests", "Moje poptávky");
}


window.deleteRequest = async function(index, sbId) {
    if(!confirm("Opravdu chcete tuto poptávku smazat?")) return;
    if (sbId && sb) {
        try {
            await sb.from("requests").delete().eq("id", sbId);
            await sb.from("offers").delete().eq("request_id", sbId);
            await sb.from("messages").delete().eq("conversation_id", String(sbId));
        } catch(e) { console.error("Chyba při mazání:", e); }
    }
    STATE.requests.splice(index, 1);
    refreshRequestsList(); refreshDashboard();
}


window.showFinalizeForm = function() {

}

function buildNav(items) {
    document.getElementById("sidebar-nav").innerHTML = items.map(item => `<button onclick="goTab('${item.id}','${item.label}')" id="nav-${item.id}" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 text-sm"><i class="fa-solid ${item.icon} w-5 text-center text-base"></i> ${item.label}</button>`).join("");
    document.getElementById("bottom-nav-items").innerHTML = items.map(item => `<button onclick="goTab('${item.id}','${item.label}')" id="bnav-${item.id}" class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 hover:text-fixit-500 transition"><i class="fa-solid ${item.icon} text-lg"></i><span class="text-[10px] font-bold">${item.label.split(" ")[0]}</span></button>`).join("");

window.goTab = function(id, title) {
    document.querySelectorAll("[id^=\"view-\"]").forEach(el => { el.classList.add("hidden"); el.classList.remove("fade-up"); });
    document.querySelectorAll(".nav-item").forEach(el => { el.classList.remove("active","text-slate-900","dark:text-white"); el.classList.add("text-slate-600","dark:text-slate-400"); });
    document.querySelectorAll("[id^=\"bnav-\"]").forEach(el => { el.classList.remove("text-fixit-500"); el.classList.add("text-slate-400"); });
    const view = document.getElementById("view-" + id);
    if (view) { view.classList.remove("hidden"); void view.offsetWidth; view.classList.add("fade-up"); }
    const sideBtn = document.getElementById("nav-" + id);
    if (sideBtn) { sideBtn.classList.add("active","text-slate-900","dark:text-white"); sideBtn.classList.remove("text-slate-600","dark:text-slate-400"); }
    const botBtn = document.getElementById("bnav-" + id);
    if (botBtn) { botBtn.classList.remove("text-slate-400"); botBtn.classList.add("text-fixit-500"); }
    if (title) document.getElementById("page-title").innerText = title;
    if (id === "messages") loadCustomerConversations();
    if (id === "c-messages") loadCraftsmanConversations();
    if (id === "market") loadMarketFromDB();
}

function refreshRequestsList() {
    const list = document.getElementById("requests-list"); if (!list) return;
    const empty = document.getElementById("empty-req");
    if (STATE.requests.length === 0) { if(empty) empty.classList.remove("hidden"); return; }
    if (empty) empty.classList.add("hidden");
    list.querySelectorAll(".req-card").forEach(c => c.remove());
    STATE.requests.forEach((req, i) => {
        const statusMap = { waiting:"Hledáme profíka", active:"Probíhá oprava", done:"Dokončeno" };
        const badgeMap = { waiting:"status-waiting", active:"status-active", done:"status-done" };
        const div = document.createElement("div");
        div.className = "req-card bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 hover:border-fixit-500 hover:shadow-md transition fade-up";
        div.innerHTML = `<div class="flex items-center justify-between mb-2"><h4 class="font-extrabold dark:text-white truncate mr-3">${req.title}</h4><span class="status-badge ${badgeMap[req.status]} shrink-0">${statusMap[req.status]}</span></div><p class="text-sm text-slate-500 mb-3">${req.kat} • ${req.time}</p><p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed line-clamp-2">${req.popis}</p><div class="flex gap-2 mt-4"><button onclick="loadOffersForRequest(${req.sbId||0},'${(req.title||"").replace(/'/g,"\\'")}')" class="flex-1 text-xs font-bold py-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-fixit-500 hover:text-white transition">Zobrazit nabídky</button><button onclick="markDone(${i})" class="text-xs font-bold py-2 px-3 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-500 hover:border-green-500 hover:text-green-600 transition">Označit hotovo</button></div>`;
        list.insertBefore(div, list.querySelector("#empty-req"));
    });
}

window.markDone = function(i) { STATE.requests[i].status = "done"; refreshRequestsList(); refreshDashboard(); }

function refreshDashboard() {
    const sa = document.getElementById("stat-active"); if(sa) sa.innerText = STATE.requests.filter(r => r.status !== "done").length;
    const st = document.getElementById("stat-total"); if(st) st.innerText = STATE.requests.length;

let activeChatId = null, msgSubscription = null;

window.openConversation = async function(requestId, partnerName, partnerSeed) {
    activeChatId = String(requestId);
    const nameEl = document.getElementById("chat-partner-name") || document.getElementById("chat-partner-name-c");
    if (nameEl) nameEl.innerText = partnerName;
    const avatarEl = document.getElementById("chat-partner-avatar");
    if (avatarEl) avatarEl.style.backgroundImage = "url(https://api.dicebear.com/7.x/avataaars/svg?seed=" + partnerSeed + ")";
    document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("bg-fixit-50","border-fixit-500"));
    const ac = document.getElementById("conv-" + requestId); if(ac) ac.classList.add("bg-fixit-50","border-fixit-500");
    await loadMessages(requestId);
    subscribeMessages(requestId);
}

async function loadMessages(requestId) {
    const boxId = APP_ROLE === "customer" ? "chat-msgs" : "chat-msgs-c";
    const box = document.getElementById(boxId); if (!box) return;
    box.innerHTML = "<div class=\"text-center text-slate-400 text-sm py-4\">Načítám zprávy...</div>";
    if (!sb) { box.innerHTML = "<div class=\"text-center text-slate-400 text-sm py-4\">Nepřipojeno.</div>"; return; }
    const { data, error } = await sb.from("messages").select("*").eq("conversation_id", String(requestId)).order("created_at", { ascending: true });
    if (error) { box.innerHTML = "<div class=\"text-center text-red-400 text-sm py-4\">Chyba načítání.</div>"; return; }
    box.innerHTML = "";
    if (data.length === 0) { box.innerHTML = "<div class=\"text-center text-slate-400 text-sm py-4\">Zatím žádné zprávy.</div>"; return; }
    data.forEach(m => renderMessage(m, boxId));
    box.scrollTop = box.scrollHeight;
}

function renderMessage(m, boxId) {
    const box = document.getElementById(boxId); if (!box) return;
    const isMe = m.sender_id === APP_USER?.id;
    const time = new Date(m.created_at).toLocaleTimeString("cs",{hour:"2-digit",minute:"2-digit"});
    box.querySelector(".text-center")?.remove();
    const d = document.createElement("div");
    d.className = "flex " + (isMe ? "justify-end" : "justify-start");
    d.innerHTML = "<div class=\"max-w-[70%]\">" + (!isMe ? "<p class=\"text-[10px] font-bold text-slate-400 mb-1 ml-1\">" + (m.sender_name||"Uživatel") + "</p>" : "") + "<div class=\"px-4 py-2.5 rounded-2xl text-sm " + (isMe ? "bg-fixit-500 text-white" : "bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-white") + "\"><p>" + m.text + "</p><p class=\"text-[10px] opacity-60 mt-1 " + (isMe?"text-right":"") + "\">" + time + "</p></div></div>";
    box.appendChild(d); box.scrollTop = box.scrollHeight;
}

function subscribeMessages(requestId) {
    if (msgSubscription) { try { sb.removeChannel(msgSubscription); } catch(e) {} }
    if (!sb) return;
    const boxId = APP_ROLE === "customer" ? "chat-msgs" : "chat-msgs-c";
    msgSubscription = sb.channel("msgs-" + requestId).on("postgres_changes", { event:"INSERT", schema:"public", table:"messages", filter:"conversation_id=eq." + requestId }, payload => { if (payload.new.sender_id !== APP_USER?.id) renderMessage(payload.new, boxId); }).subscribe();
}

window.sendMsg = async function() {
    const inp = document.getElementById("msg-input");
    const txt = inp?.value?.trim(); if (!txt) return;
    if (!activeChatId) { alert("Vyberte konverzaci."); return; }
    inp.value = "";
    const msgData = { conversation_id: activeChatId, sender_id: APP_USER?.id, sender_name: document.getElementById("user-name").innerText, text: txt };
    renderMessage({ ...msgData, created_at: new Date().toISOString() }, "chat-msgs");
    if (sb) await sb.from("messages").insert(msgData);
}

window.sendMsgC = async function() {
    const inp = document.getElementById("msg-input-c");
    const txt = inp?.value?.trim(); if (!txt) return;
    if (!activeChatId) { alert("Vyberte konverzaci."); return; }
    inp.value = "";
    const msgData = { conversation_id: activeChatId, sender_id: APP_USER?.id, sender_name: document.getElementById("user-name").innerText, text: txt };
    renderMessage({ ...msgData, created_at: new Date().toISOString() }, "chat-msgs-c");
    if (sb) await sb.from("messages").insert(msgData);
}

window.loadCustomerConversations = async function() {
    const list = document.getElementById("conv-list"); if (!list || !sb || !APP_USER) return;
    const { data: reqs } = await sb.from("requests").select("*").eq("customer_id", APP_USER.id).order("created_at", { ascending: false });

    list.innerHTML = reqs.map(r => `<div id="conv-${r.id}" onclick="openConversation(${r.id},'Řemeslník','craftsman${r.id}')" class="conv-item p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 border-b border-slate-100 dark:border-slate-800 border-l-2 border-l-transparent transition"><p class="font-bold text-sm dark:text-white truncate">${r.title}</p><p class="text-xs text-slate-400 mt-0.5">${r.category} • <span class="text-fixit-500">${r.status==="waiting"?"Hledáme":r.status==="active"?"Probíhá":"Hotovo"}</span></p></div>`).join("");
}

window.loadCraftsmanConversations = async function() {
    const list = document.getElementById("conv-list-c"); if (!list || !sb || !APP_USER) return;
    const { data: offers } = await sb.from("offers").select("*, requests(*)").eq("craftsman_id", APP_USER.id).order("created_at", { ascending: false });

    list.innerHTML = offers.map(o => `<div id="conv-${o.request_id}" onclick="openConversation(${o.request_id},'${(o.requests?.customer_name||"Zákazník").replace(/'/g,"\\'")}','customer${o.request_id}')" class="conv-item p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 border-b border-slate-100 dark:border-slate-800 border-l-2 border-l-transparent transition"><p class="font-bold text-sm dark:text-white truncate">${o.requests?.title||"Poptávka"}</p><p class="text-xs text-slate-400 mt-0.5">${o.requests?.category||""} • ${o.requests?.customer_name||"Zákazník"}</p></div>`).join("");
}

window.applyJob = async function(btn, title, requestId) {
    if (!sb || !APP_USER) { alert("Musíte být přihlášeni."); return; }
    btn.innerHTML = "<i class=\"fa-solid fa-circle-notch fa-spin mr-2\"></i>Odesílám..."; btn.disabled = true;
    try {
        const { error } = await sb.from("offers").insert({ request_id: requestId, craftsman_id: APP_USER.id, craftsman_name: document.getElementById("user-name").innerText, message: "Mám zájem o zakázku: " + title, price: "Dohodou", status: "pending" });
        if (error) throw error;
        btn.innerHTML = "<i class=\"fa-solid fa-check mr-2\"></i>Nabídka odeslána!";
        btn.className = btn.className.replace("bg-fixit-500 hover:bg-fixit-600","bg-green-500"); btn.disabled = true;
        STATE.craftJobs.push({ title, requestId, status:"pending", time: new Date().toLocaleTimeString("cs",{hour:"2-digit",minute:"2-digit"}) });
        refreshCraftsmanJobs(); activeChatId = String(requestId);
    } catch(e) { btn.innerHTML = "Podat nabídku"; btn.disabled = false; alert("Chyba: " + e.message); }
}

window.loadOffersForRequest = async function(requestId, requestTitle) {
    if (!sb) return;
    const { data: offers } = await sb.from("offers").select("*").eq("request_id", requestId).order("created_at", { ascending: false });
    document.getElementById("offers-modal-title").innerText = requestTitle;
    const modalList = document.getElementById("offers-modal-list");
    if (!offers || offers.length === 0) { modalList.innerHTML = "<div class=\"text-center text-slate-400 py-8\"><i class=\"fa-solid fa-inbox text-3xl mb-3 block\"></i><p>Zatím žádné nabídky.</p></div>"; }
    else { modalList.innerHTML = offers.map(o => `<div class="p-4 border border-slate-200 dark:border-slate-700 rounded-2xl"><div class="flex items-center gap-3 mb-3"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(o.craftsman_name)}&backgroundColor=0f172a" class="w-10 h-10 rounded-full bg-slate-200"><div><p class="font-bold dark:text-white">${o.craftsman_name}</p><p class="text-xs text-slate-500">${new Date(o.created_at).toLocaleDateString("cs")}</p></div><span class="ml-auto font-bold text-fixit-500">${o.price}</span></div><p class="text-sm text-slate-600 dark:text-slate-400 mb-3">${o.message}</p><button onclick="acceptOffer(${o.id},${requestId},'${(o.craftsman_name||"").replace(/'/g,"\\'")}'); closeOffersModal();" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white py-2.5 rounded-xl font-bold text-sm transition">Přijmout & Zahájit chat</button></div>`).join(""); }
    const modal = document.getElementById("offers-modal"); modal.classList.remove("hidden"); void modal.offsetWidth; modal.classList.add("opacity-100");
}

// ===== CHYBĚJÍCÍ FUNKCE =====

function refreshRequestsList() {
    const list = document.getElementById("requests-list");
    if (!list) return;
    const empty = document.getElementById("empty-req");
    if (STATE.requests.length === 0) { if(empty) empty.classList.remove("hidden"); return; }
    if (empty) empty.classList.add("hidden");
    list.querySelectorAll(".req-card").forEach(c => c.remove());
    STATE.requests.forEach((req, i) => {
        const div = document.createElement("div");
        div.innerHTML = createBeautifulCard(req, false, i);
        list.insertBefore(div.firstElementChild, list.querySelector("#empty-req"));
    });
}

function refreshDashboard() {
    const sa = document.getElementById("stat-active"); if(sa) sa.innerText = STATE.requests.filter(r => r.status !== "done").length;
    const st = document.getElementById("stat-total"); if(st) st.innerText = STATE.requests.length;
    const dl = document.getElementById("dash-requests-list");
    if (dl && STATE.requests.length > 0) {
        dl.innerHTML = STATE.requests.slice(0,3).map(r => `
            <div class="flex items-center gap-4 py-4 border-b border-slate-100 dark:border-slate-800 last:border-0">
                <div class="w-10 h-10 bg-fixit-50 dark:bg-fixit-500/10 text-fixit-500 rounded-2xl flex items-center justify-center shrink-0"><i class="fa-solid fa-clipboard-list"></i></div>
                <div class="flex-1 min-w-0"><p class="font-bold dark:text-white truncate">${r.title}</p><p class="text-xs text-slate-500 mt-0.5">${r.kat} • ${r.time}</p></div>
                <span class="status-badge ${r.status==="done"?"status-done":"status-waiting"} shrink-0 text-[10px]">${r.status==="done"?"Hotovo":"Čeká"}</span>
            </div>`).join("");
    }
}

window.markDone = function(i) {
    if (STATE.requests[i]) {
        STATE.requests[i].status = "done";
        if (STATE.requests[i].sbId && sb) sb.from("requests").update({ status: "done" }).eq("id", STATE.requests[i].sbId).then(() => {});
    }
    refreshRequestsList(); refreshDashboard();
}

// ===== SUPABASE FUNKCE =====
let activeChatId = null, msgSubscription = null;

window.openConversation = async function(requestId, partnerName, partnerSeed) {
    activeChatId = String(requestId);
    const nameEl = document.getElementById("chat-partner-name") || document.getElementById("chat-partner-name-c");
    if (nameEl) nameEl.innerText = partnerName;
    const avatarEl = document.getElementById("chat-partner-avatar");
    if (avatarEl) { avatarEl.style.backgroundImage = `url(https://api.dicebear.com/7.x/avataaars/svg?seed=${partnerSeed})`; avatarEl.style.backgroundSize = "cover"; }
    document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("bg-fixit-50","dark:bg-fixit-500/10","border-l-fixit-500"));
    const ac = document.getElementById("conv-" + requestId); if(ac) { ac.classList.add("bg-fixit-50","dark:bg-fixit-500/10"); ac.style.borderLeftColor = "#f59e0b"; }
    await loadMessages(requestId);
    subscribeMessages(requestId);
}

async function loadMessages(requestId) {
    const boxId = APP_ROLE === "customer" ? "chat-msgs" : "chat-msgs-c";
    const box = document.getElementById(boxId); if (!box) return;
    box.innerHTML = '<div class="text-center text-slate-400 text-sm py-8"><i class="fa-solid fa-circle-notch fa-spin text-2xl mb-3 block text-fixit-500"></i>Načítám zprávy...</div>';
    if (!sb) { box.innerHTML = '<div class="text-center text-slate-400 text-sm py-8">Nepřipojeno k databázi.</div>'; return; }
    const { data, error } = await sb.from("messages").select("*").eq("conversation_id", String(requestId)).order("created_at", { ascending: true });
    if (error) { box.innerHTML = '<div class="text-center text-red-400 text-sm py-8">Chyba načítání zpráv.</div>'; return; }
    box.innerHTML = "";
    if (data.length === 0) { box.innerHTML = '<div class="text-center text-slate-400 text-sm py-8">Zatím žádné zprávy. Napište první!</div>'; return; }
    data.forEach(m => renderMessage(m, boxId));
    box.scrollTop = box.scrollHeight;
}

function renderMessage(m, boxId) {
    const box = document.getElementById(boxId); if (!box) return;
    const isMe = m.sender_id === APP_USER?.id;
    const time = new Date(m.created_at).toLocaleTimeString("cs", {hour:"2-digit",minute:"2-digit"});
    box.querySelector(".text-center")?.remove();
    const d = document.createElement("div");
    d.className = `flex ${isMe ? "justify-end" : "justify-start"}`;
    d.innerHTML = `<div class="max-w-[70%]">
        ${!isMe ? `<p class="text-[10px] font-bold text-slate-400 mb-1 ml-1">${m.sender_name||"Uživatel"}</p>` : ""}
        <div class="px-5 py-3 rounded-2xl text-sm ${isMe ? "bg-fixit-500 text-white shadow-md shadow-fixit-500/20" : "bg-white dark:bg-slate-800 text-slate-800 dark:text-white border border-slate-200 dark:border-slate-700 shadow-sm"}">
            <p>${m.text}</p>
            <p class="text-[10px] opacity-60 mt-1.5 ${isMe?"text-right":""}">${time}</p>
        </div>
    </div>`;
    box.appendChild(d); box.scrollTop = box.scrollHeight;
}

function subscribeMessages(requestId) {
    if (msgSubscription) { try { sb.removeChannel(msgSubscription); } catch(e) {} }
    if (!sb) return;
    const boxId = APP_ROLE === "customer" ? "chat-msgs" : "chat-msgs-c";
    msgSubscription = sb.channel("msgs-" + requestId)
        .on("postgres_changes", { event:"INSERT", schema:"public", table:"messages", filter:`conversation_id=eq.${requestId}` },
            payload => { if (payload.new.sender_id !== APP_USER?.id) renderMessage(payload.new, boxId); })
        .subscribe();
}

window.sendMsg = async function() {
    const inp = document.getElementById("msg-input");
    const txt = inp?.value?.trim(); if (!txt) return;
    if (!activeChatId) { alert("Vyberte konverzaci."); return; }
    inp.value = "";
    const msgData = { conversation_id: activeChatId, sender_id: APP_USER?.id, sender_name: document.getElementById("user-name").innerText, text: txt };
    renderMessage({ ...msgData, created_at: new Date().toISOString() }, "chat-msgs");
    if (sb) await sb.from("messages").insert(msgData);
}

window.applyJob = async function(btn, title, requestId) {
    if (!sb || !APP_USER) { alert("Musíte být přihlášeni."); return; }
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Odesílám...'; btn.disabled = true;
    try {
        const { error } = await sb.from("offers").insert({ request_id: requestId, craftsman_id: APP_USER.id, craftsman_name: document.getElementById("user-name").innerText, message: `Mám zájem o zakázku: ${title}`, price: "Dohodou", status: "pending" });
        if (error) throw error;
        btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i>Nabídka odeslána!';
        btn.className = btn.className.replace("bg-fixit-500 hover:bg-fixit-600","bg-green-500"); btn.disabled = true;
        STATE.craftJobs.push({ title, requestId, status:"pending", time: new Date().toLocaleTimeString("cs",{hour:"2-digit",minute:"2-digit"}) });
        refreshCraftsmanJobs(); activeChatId = String(requestId);
    } catch(e) { btn.innerHTML = "Podat nabídku řemeslníka"; btn.disabled = false; alert("Chyba: " + e.message); }
}
