<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixit App | Klientský a Řemeslnický portál</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        fixit: { 
                            50: '#fffbeb', 100: '#fef3c7', 500: '#f59e0b', 
                            600: '#d97706', 700: '#b45309', dark: '#020617', slate: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .glass-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.2); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }
    </script>
</head>
<body class="antialiased bg-slate-50 text-slate-900 dark:bg-fixit-dark dark:text-white flex h-screen overflow-hidden">

    <aside class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between flex-shrink-0 z-50">
        <div>
            <div class="h-20 flex items-center px-8 border-b border-slate-200 dark:border-slate-800 cursor-pointer">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none" class="mr-3">
                    <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                    <circle cx="50" cy="48" r="16" fill="white"/>
                    <path d="M40 58 L30 68 L45 64 Z" fill="white"/>
                </svg>
                <span class="font-extrabold text-2xl tracking-tighter dark:text-white">Fixit</span>
                <span class="ml-2 px-2 py-0.5 bg-fixit-500/10 text-fixit-500 text-[10px] font-black uppercase tracking-widest rounded-full">App</span>
            </div>

            <nav class="p-4 space-y-2 mt-4" id="main-nav">
                </nav>
        </div>

        <div class="p-4 border-t border-slate-200 dark:border-slate-800">
            <div class="bg-slate-100 dark:bg-slate-800 p-1 rounded-xl flex mb-4 relative">
                <button onclick="switchRole('customer')" id="btn-role-customer" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all z-10">Zákazník</button>
                <button onclick="switchRole('craftsman')" id="btn-role-craftsman" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all z-10 text-slate-500">Řemeslník</button>
                <div id="role-slider" class="absolute top-1 left-1 w-[calc(50%-4px)] h-[calc(100%-8px)] bg-white dark:bg-slate-700 rounded-lg shadow-sm transition-transform duration-300"></div>
            </div>

            <button class="flex items-center gap-3 w-full p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold transition">
                <div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=f59e0b" alt="User">
                </div>
                <div class="text-left">
                    <p class="text-sm text-slate-900 dark:text-white leading-tight" id="user-name">Jan Novák</p>
                    <p class="text-xs font-normal">Můj profil</p>
                </div>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-20 glass-panel flex items-center justify-between px-8 z-40 sticky top-0">
            <h1 class="text-2xl font-extrabold" id="page-title">Přehled</h1>
            <div class="flex items-center gap-4">
                <button class="w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-500 transition relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>
                </button>
                <button id="theme-toggle" class="w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-500 transition">
                    <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-xl"></i>
                    <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-xl"></i>
                </button>
                <button class="bg-fixit-500 hover:bg-fixit-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition hover:scale-105 text-sm flex items-center gap-2" id="header-cta">
                    <i class="fa-solid fa-plus"></i> Nová poptávka
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 hide-scroll pb-32" id="app-content">
            </div>
    </main>

    <script>
        // --- DATA A STAV PROTOTYPU ---
        let currentRole = 'customer';

        const navConfig = {
            customer: [
                { icon: 'fa-house', text: 'Nástěnka', active: true },
                { icon: 'fa-list-check', text: 'Moje poptávky' },
                { icon: 'fa-comment-dots', text: 'Zprávy' },
                { icon: 'fa-credit-card', text: 'Platby (Escrow)' }
            ],
            craftsman: [
                { icon: 'fa-map-location-dot', text: 'Tržiště zakázek', active: true },
                { icon: 'fa-hammer', text: 'Moje práce' },
                { icon: 'fa-comment-dots', text: 'Zprávy' },
                { icon: 'fa-wallet', text: 'Výdělky' }
            ]
        };

        // --- RENDER FUNKCE ---
        function renderNav() {
            const navEl = document.getElementById('main-nav');
            navEl.innerHTML = navConfig[currentRole].map(item => `
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl font-bold transition ${item.active ? 'bg-fixit-500/10 text-fixit-500 dark:bg-fixit-500/20' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white'}">
                    <i class="fa-solid ${item.icon} w-5 text-center ${item.active ? '' : 'opacity-70'}"></i>
                    ${item.text}
                </a>
            `).join('');
        }

        function renderCustomerDashboard() {
            return `
                <div class="mb-10">
                    <h2 class="text-3xl font-extrabold mb-2">Vítejte doma, Jane 👋</h2>
                    <p class="text-slate-500 dark:text-slate-400">Tady je přehled vašich aktuálních řešení.</p>
                </div>

                <div class="grid lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold text-xl uppercase tracking-widest text-slate-400 text-sm">Aktivní poptávka</h3>
                            <span class="bg-blue-100 text-blue-600 dark:bg-blue-500/20 dark:text-blue-400 px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest">Přijímáte nabídky</span>
                        </div>
                        
                        <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 border border-slate-200 dark:border-slate-700 shadow-sm relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-2 h-full bg-fixit-500"></div>
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <span class="text-fixit-500 font-bold text-sm uppercase tracking-widest mb-2 block">Instalatérství</span>
                                    <h4 class="text-2xl font-extrabold">Oprava protékajícího dřezu</h4>
                                </div>
                                <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=200&h=200" class="w-16 h-16 rounded-xl object-cover border border-slate-100">
                            </div>
                            <p class="text-slate-600 dark:text-slate-300 leading-relaxed mb-6">Voda kape ze sifonu pod kuchyňskou linkou. Zkoušel jsem to dotáhnout, ale nepomohlo to. Potřebuji přetěsnit nebo vyměnit sifon. Naléhavé, kape to na podlahu.</p>
                            
                            <div class="border-t border-slate-100 dark:border-slate-700 pt-6">
                                <h5 class="font-bold text-sm text-slate-500 uppercase tracking-widest mb-4">Obdržené nabídky (2)</h5>
                                
                                <div class="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-4 mb-3 border border-fixit-500/30">
                                    <div class="flex items-center gap-4">
                                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Karel&backgroundColor=0f172a" class="w-12 h-12 rounded-full">
                                        <div>
                                            <p class="font-extrabold">Karel V. <span class="text-yellow-500 ml-1"><i class="fa-solid fa-star"></i> 4.9</span></p>
                                            <p class="text-sm text-slate-500">Může dorazit: Dnes v 15:30</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4 w-full md:w-auto">
                                        <div class="text-right hidden md:block">
                                            <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">Cena</p>
                                            <p class="font-black text-xl">1 200 Kč</p>
                                        </div>
                                        <button class="w-full md:w-auto bg-fixit-500 hover:bg-fixit-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transition hover:scale-105">Vybrat a zaplatit</button>
                                    </div>
                                </div>

                                <div class="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-4 border border-slate-200 dark:border-slate-700">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-xl font-bold">P</div>
                                        <div>
                                            <p class="font-extrabold">Petr S. <span class="text-yellow-500 ml-1"><i class="fa-solid fa-star"></i> 4.7</span></p>
                                            <p class="text-sm text-slate-500">Může dorazit: Zítra dopoledne</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4 w-full md:w-auto">
                                        <div class="text-right hidden md:block">
                                            <p class="text-xs text-slate-500 font-bold">Cena</p>
                                            <p class="font-black text-xl text-slate-500">950 Kč</p>
                                        </div>
                                        <button class="w-full md:w-auto bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 px-6 py-3 rounded-xl font-bold transition hover:bg-slate-50 dark:hover:bg-slate-700">Vybrat</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="bg-fixit-500 text-white p-8 rounded-3xl relative overflow-hidden shadow-xl shadow-fixit-500/20">
                            <i class="fa-solid fa-shield-halved absolute -bottom-4 -right-4 text-8xl opacity-20"></i>
                            <h3 class="font-extrabold text-xl mb-2 relative z-10">Escrow Ochrana</h3>
                            <p class="text-white/90 text-sm leading-relaxed relative z-10 mb-4">Vaše peníze jsou v bezpečí. Řemeslníkovi je přepošleme až ve chvíli, kdy v aplikaci potvrdíte, že je oprava hotová.</p>
                            <button class="bg-white text-fixit-700 px-5 py-2 rounded-lg font-bold text-sm relative z-10 hover:scale-105 transition">Jak to funguje?</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCraftsmanDashboard() {
            return `
                <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-4">
                    <div>
                        <h2 class="text-3xl font-extrabold mb-2">Tržiště zakázek 🛠️</h2>
                        <p class="text-slate-500 dark:text-slate-400">Brno a okolí do 15 km. Tyto poptávky čekají na vaši nabídku.</p>
                    </div>
                    <div class="flex gap-4">
                        <div class="bg-white dark:bg-slate-800 px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-green-100 text-green-600 flex items-center justify-center"><i class="fa-solid fa-wallet"></i></div>
                            <div>
                                <p class="text-xs text-slate-500 font-bold uppercase">Tento měsíc</p>
                                <p class="font-black text-lg">24 500 Kč</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid lg:grid-cols-2 gap-6">
                    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-xl transition-shadow cursor-pointer group">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-fixit-100 text-fixit-700 dark:bg-fixit-500/20 dark:text-fixit-400 px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest">Elektrikář</span>
                            <span class="text-sm font-bold text-slate-400"><i class="fa-solid fa-location-dot"></i> Královo Pole (3.2 km)</span>
                        </div>
                        <h4 class="text-xl font-extrabold mb-2 group-hover:text-fixit-500 transition-colors">Výměna vyhořelých zásuvek</h4>
                        <p class="text-slate-600 dark:text-slate-400 text-sm line-clamp-2 mb-6">Při zapojení rychlovarné konvice to zajiskřilo a dvě zásuvky v kuchyni nefungují. Jističe jsem nahodil, ale do zásuvek nejde proud.</p>
                        
                        <div class="flex items-center justify-between pt-4 border-t border-slate-100 dark:border-slate-700">
                            <div>
                                <p class="text-xs text-slate-500 font-bold">Odhad AI</p>
                                <p class="font-black text-slate-900 dark:text-white">800 - 1500 Kč</p>
                            </div>
                            <button class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-6 py-2.5 rounded-xl font-bold transition hover:scale-105 shadow-md">Dát nabídku</button>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-xl transition-shadow cursor-pointer group">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-fixit-100 text-fixit-700 dark:bg-fixit-500/20 dark:text-fixit-400 px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest">Instalatér</span>
                            <span class="text-sm font-bold text-slate-400"><i class="fa-solid fa-location-dot"></i> Bystrc (8.5 km)</span>
                        </div>
                        <h4 class="text-xl font-extrabold mb-2 group-hover:text-fixit-500 transition-colors">Montáž nové pračky a sušičky</h4>
                        <p class="text-slate-600 dark:text-slate-400 text-sm line-clamp-2 mb-6">Potřebuji zapojit novou pračku a sušičku na stávající rozvody v koupelně. Bude nutné dát rozdvojku na odpad.</p>
                        
                        <div class="flex items-center justify-between pt-4 border-t border-slate-100 dark:border-slate-700">
                            <div>
                                <p class="text-xs text-slate-500 font-bold">Odhad AI</p>
                                <p class="font-black text-slate-900 dark:text-white">1000 - 2000 Kč</p>
                            </div>
                            <button class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-6 py-2.5 rounded-xl font-bold transition hover:scale-105 shadow-md">Dát nabídku</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- LOGIKA PŘEPÍNÁNÍ ---
        window.switchRole = function(role) {
            currentRole = role;
            
            // UI Slider
            const slider = document.getElementById('role-slider');
            const btnCustomer = document.getElementById('btn-role-customer');
            const btnCraftsman = document.getElementById('btn-role-craftsman');
            
            if (role === 'customer') {
                slider.style.transform = 'translateX(0)';
                btnCustomer.classList.remove('text-slate-500');
                btnCraftsman.classList.add('text-slate-500');
                document.getElementById('user-name').innerText = 'Jan Novák';
                document.getElementById('header-cta').innerHTML = '<i class="fa-solid fa-plus"></i> Nová poptávka';
                document.getElementById('page-title').innerText = 'Přehled';
            } else {
                slider.style.transform = 'translateX(100%)';
                btnCraftsman.classList.remove('text-slate-500');
                btnCustomer.classList.add('text-slate-500');
                document.getElementById('user-name').innerText = 'Karel (Instalatér)';
                document.getElementById('header-cta').innerHTML = '<i class="fa-solid fa-toggle-on"></i> Jsem online';
                document.getElementById('page-title').innerText = 'Tržiště';
            }

            renderNav();
            document.getElementById('app-content').innerHTML = role === 'customer' ? renderCustomerDashboard() : renderCraftsmanDashboard();
        }

        // --- DARK MODE TOGGLE ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const updateIcons = () => {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-toggle-dark-icon').classList.toggle('hidden', isDark);
            document.getElementById('theme-toggle-light-icon').classList.toggle('hidden', !isDark);
        };
        updateIcons();
        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcons();
        });

        // Init
        switchRole('customer');
    </script>
</body>
</html>
