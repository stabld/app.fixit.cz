<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixit App | Klientský a Řemeslnický portál</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        fixit: { 
                            50: '#fffbeb', 100: '#fef3c7', 500: '#f59e0b', 
                            600: '#d97706', 700: '#b45309', dark: '#020617', slate: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .glass-panel { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.85); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-enter { opacity: 0; transition: opacity 0.3s ease-in-out; }
        .fade-enter-active { opacity: 1; }
        
        .nav-item.active { background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .dark .nav-item.active { background-color: rgba(245, 158, 11, 0.2); }
    </style>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }
    </script>
</head>
<body class="antialiased bg-slate-50 text-slate-900 dark:bg-fixit-dark dark:text-white h-screen overflow-hidden relative">

    <div id="auth-screen" class="absolute inset-0 z-[100] flex items-center justify-center bg-slate-50 dark:bg-fixit-dark p-4 transition-opacity duration-500">
        <div class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800 p-8 md:p-12">
            
            <div class="flex justify-center items-center gap-3 mb-8">
                <div class="w-14 h-14 relative flex items-center justify-center">
                    <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none">
                        <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                        <circle cx="50" cy="48" r="16" class="fill-white dark:fill-slate-900"/>
                        <path d="M40 58 L30 68 L45 64 Z" class="fill-white dark:fill-slate-900"/>
                    </svg>
                </div>
                <span class="font-extrabold text-4xl tracking-tighter text-slate-900 dark:text-white">Fixit</span>
            </div>

            <h2 class="text-2xl md:text-3xl font-extrabold mb-2 text-center text-slate-900 dark:text-white">Vítejte v aplikaci</h2>
            <p class="text-slate-500 dark:text-slate-400 text-center mb-10 text-lg">Vyberte, jak chcete Fixit používat</p>
            
            <div class="grid md:grid-cols-2 gap-6">
                <button onclick="login('customer', this)" class="group bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-fixit-500 dark:hover:border-fixit-500 rounded-[2rem] p-8 flex flex-col items-center gap-4 transition-all hover:-translate-y-1 hover:shadow-xl text-center relative overflow-hidden">
                    <div class="w-20 h-20 bg-white dark:bg-slate-700 text-fixit-500 rounded-2xl flex items-center justify-center text-3xl group-hover:bg-fixit-500 group-hover:text-white transition-all shadow-sm">
                        <i class="fa-solid fa-house-chimney-window"></i>
                    </div>
                    <div>
                        <h3 class="font-extrabold text-xl text-slate-900 dark:text-white mb-2">Vstoupit jako poptávající</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">Potřebuji opravit něco doma a hledám ověřeného profíka.</p>
                    </div>
                    <div class="loading-overlay absolute inset-0 bg-white/90 dark:bg-slate-800/90 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-fixit-500 mb-2"></i>
                        <span class="font-bold text-sm text-fixit-600">Přihlašuji...</span>
                    </div>
                </button>

                <button onclick="login('craftsman', this)" class="group bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-fixit-500 dark:hover:border-fixit-500 rounded-[2rem] p-8 flex flex-col items-center gap-4 transition-all hover:-translate-y-1 hover:shadow-xl text-center relative overflow-hidden">
                    <div class="w-20 h-20 bg-white dark:bg-slate-700 text-slate-400 group-hover:bg-fixit-500 group-hover:text-white transition-all rounded-2xl flex items-center justify-center text-3xl shadow-sm">
                        <i class="fa-solid fa-toolbox"></i>
                    </div>
                    <div>
                        <h3 class="font-extrabold text-xl text-slate-900 dark:text-white mb-2">Vstoupit jako řemeslník</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">Jsem profík a chci získat přístup k novým zakázkám v okolí.</p>
                    </div>
                    <div class="loading-overlay absolute inset-0 bg-white/90 dark:bg-slate-800/90 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-fixit-500 mb-2"></i>
                        <span class="font-bold text-sm text-fixit-600">Přihlašuji...</span>
                    </div>
                </button>
            </div>
            
            <div class="mt-8 text-center">
                <a href="/" class="text-sm font-bold text-slate-400 hover:text-fixit-500 transition">Zpět na hlavní web</a>
            </div>
        </div>
    </div>

    <div id="main-app" class="flex h-screen w-full hidden opacity-0 transition-opacity duration-500">
        
        <aside class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between flex-shrink-0 z-50">
            <div>
                <div class="h-20 flex items-center px-8 border-b border-slate-200 dark:border-slate-800 cursor-pointer">
                    <div class="w-10 h-10 relative flex items-center justify-center mr-3">
                        <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none">
                            <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                            <circle cx="50" cy="48" r="16" class="fill-white dark:fill-slate-900"/>
                            <path d="M40 58 L30 68 L45 64 Z" class="fill-white dark:fill-slate-900"/>
                        </svg>
                    </div>
                    <span class="font-extrabold text-2xl tracking-tighter dark:text-white">Fixit</span>
                    <span class="ml-2 px-2 py-0.5 bg-fixit-500/10 text-fixit-500 text-[10px] font-black uppercase tracking-widest rounded-full">App</span>
                </div>

                <nav class="p-4 space-y-2 mt-4" id="main-nav"></nav>
            </div>

            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <button onclick="logout()" class="w-full mb-4 px-4 py-2 rounded-xl text-sm font-bold text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Odhlásit se
                </button>
                <div class="flex items-center gap-3 w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700">
                    <div class="w-10 h-10 rounded-full bg-fixit-100 overflow-hidden shrink-0">
                        <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=f59e0b" alt="User">
                    </div>
                    <div class="text-left truncate">
                        <p class="text-sm font-bold text-slate-900 dark:text-white leading-tight" id="user-name">Jan Novák</p>
                        <p class="text-xs text-slate-500 font-medium" id="user-role-label">Zákazník</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden relative bg-slate-50 dark:bg-fixit-dark">
            <header class="h-20 glass-panel flex items-center justify-between px-8 z-40 sticky top-0">
                <h1 class="text-2xl font-extrabold" id="header-title">Nástěnka</h1>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center text-slate-500 transition">
                        <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-xl"></i>
                        <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-xl"></i>
                    </button>
                    <div id="header-cta-container"></div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 hide-scroll pb-32 relative" id="views-container">
                </div>
        </main>
    </div>

    <div id="modal-payment-success" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl max-w-md w-full text-center shadow-2xl transform scale-90 transition-transform duration-300" id="modal-payment-box">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center text-white text-4xl mx-auto mb-6 shadow-lg shadow-green-500/30">
                <i class="fa-solid fa-check"></i>
            </div>
            <h3 class="text-2xl font-extrabold mb-2">Peníze jsou v úschově!</h3>
            <p class="text-slate-500 mb-8 leading-relaxed">Částka 1 200 Kč byla rezervována z vaší karty. Řemeslník Karel V. dostal zprávu, že může vyrazit.</p>
            <button onclick="closePaymentModal()" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-4 rounded-xl hover:bg-fixit-500 transition">Zpět na Nástěnku</button>
        </div>
    </div>

    <script>
        // --- 1. PŘIHLÁŠENÍ ---
        let currentRole = null;

        function login(role, buttonElement) {
            // Zobraz loading animaci na kliknutém tlačítku
            const overlay = buttonElement.querySelector('.loading-overlay');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            
            setTimeout(() => {
                const authScreen = document.getElementById('auth-screen');
                const mainApp = document.getElementById('main-app');
                
                authScreen.style.opacity = '0';
                setTimeout(() => {
                    authScreen.classList.add('hidden');
                    
                    // Nastavení aplikace podle zvolené role
                    initApp(role);
                    
                    mainApp.classList.remove('hidden');
                    void mainApp.offsetWidth; // Reflow hack
                    mainApp.style.opacity = '1';
                    
                    // Schováme loading pro případ odhlášení
                    overlay.classList.add('opacity-0', 'pointer-events-none');
                }, 500);
            }, 1000);
        }

        function logout() {
            window.location.reload(); // Pro ukázku stačí reload
        }

        // --- 2. INICIALIZACE APLIKACE (Menu a Obsah) ---
        const appStructure = {
            customer: {
                nav: [
                    { id: 'c-dashboard', icon: 'fa-house', text: 'Nástěnka' },
                    { id: 'c-requests', icon: 'fa-list-check', text: 'Moje poptávky' },
                    { id: 'c-messages', icon: 'fa-comment-dots', text: 'Zprávy', badge: true },
                    { id: 'c-payments', icon: 'fa-shield-halved', text: 'Platby & Escrow' },
                    { id: 'c-new', icon: 'fa-plus', text: 'Nová poptávka', hidden: true }
                ],
                profile: { name: 'Jan Novák', label: 'Zákazník', seed: 'Felix' },
                cta: `<button onclick="switchTab('c-new', 'Nová poptávka')" class="bg-fixit-500 hover:bg-fixit-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition hover:scale-105 text-sm flex items-center gap-2"><i class="fa-solid fa-plus"></i> Nová poptávka</button>`
            },
            craftsman: {
                nav: [
                    { id: 'r-market', icon: 'fa-map-location-dot', text: 'Tržiště zakázek' },
                    { id: 'r-jobs', icon: 'fa-hammer', text: 'Moje práce' },
                    { id: 'r-messages', icon: 'fa-comment-dots', text: 'Zprávy' },
                    { id: 'r-earnings', icon: 'fa-wallet', text: 'Výdělky' }
                ],
                profile: { name: 'Karel (Instalatér)', label: 'Řemeslník', seed: 'Karel' },
                cta: `<div class="bg-green-100 text-green-600 dark:bg-green-500/20 dark:text-green-400 px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2"><i class="fa-solid fa-toggle-on"></i> Jsem online</div>`
            }
        };

        function initApp(role) {
            currentRole = role;
            const config = appStructure[role];

            // 1. Aktualizace Profilu
            document.getElementById('user-name').innerText = config.profile.name;
            document.getElementById('user-role-label').innerText = config.profile.label;
            document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${config.profile.seed}&backgroundColor=${role === 'customer' ? 'f59e0b' : '0f172a'}`;
            
            // 2. Aktualizace CTA v hlavičce
            document.getElementById('header-cta-container').innerHTML = config.cta;

            // 3. Vykreslení Menu
            const navHtml = config.nav.filter(item => !item.hidden).map(item => `
                <button onclick="switchTab('${item.id}', '${item.text}')" id="nav-${item.id}" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold transition hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
                    <div class="relative">
                        <i class="fa-solid ${item.icon} w-5 text-center"></i>
                        ${item.badge ? '<span class="absolute -top-1 -right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>' : ''}
                    </div>
                    ${item.text}
                </button>
            `).join('');
            document.getElementById('main-nav').innerHTML = navHtml;

            // 4. Vykreslení a přepnutí obsahu
            document.getElementById('views-container').innerHTML = role === 'customer' ? getCustomerHTML() : getCraftsmanHTML();
            
            // Přepneme na první záložku podle role
            const firstTabId = config.nav[0].id;
            switchTab(firstTabId, config.nav[0].text);
        }

        function switchTab(tabId, title) {
            // Skrýt všechny pohledy
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('fade-enter-active');
            });
            
            // Odoznačit všechny položky menu
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
                el.classList.add('text-slate-600', 'dark:text-slate-400');
            });

            // Zobrazit vybraný pohled
            const activeView = document.getElementById(`view-${tabId}`);
            if(activeView) {
                activeView.classList.remove('hidden');
                setTimeout(() => activeView.classList.add('fade-enter-active'), 10);
            }
            
            // Zvýraznit menu
            const activeNav = document.getElementById(`nav-${tabId}`);
            if (activeNav) {
                activeNav.classList.add('active');
                activeNav.classList.remove('text-slate-600', 'dark:text-slate-400');
            }

            // Změnit nadpis
            if(title) document.getElementById('header-title').innerText = title;
        }

        // --- 3. HTML ŠABLONY ---
        function getCustomerHTML() {
            return `
                <div id="view-c-dashboard" class="view-section hidden">
                    <div class="mb-10">
                        <h2 class="text-3xl font-extrabold mb-2">Vítejte doma, Jane 👋</h2>
                        <p class="text-slate-500 dark:text-slate-400">Máte jednu aktivní poptávku, která vyžaduje vaši pozornost.</p>
                    </div>

                    <div class="grid xl:grid-cols-3 gap-8">
                        <div class="xl:col-span-2 space-y-6">
                            <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 border border-slate-200 dark:border-slate-700 shadow-sm relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-2 h-full bg-fixit-500"></div>
                                <div class="flex justify-between items-start mb-6">
                                    <div>
                                        <div class="flex items-center gap-3 mb-2">
                                            <span class="text-fixit-500 font-bold text-sm uppercase tracking-widest">Instalatérství</span>
                                            <span id="status-badge" class="bg-blue-100 text-blue-600 dark:bg-blue-500/20 dark:text-blue-400 px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest">Vyberte nabídku</span>
                                        </div>
                                        <h4 class="text-2xl font-extrabold">Oprava protékajícího dřezu</h4>
                                    </div>
                                    <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=200&h=200" class="w-16 h-16 rounded-xl object-cover border border-slate-100">
                                </div>
                                <p class="text-slate-600 dark:text-slate-300 leading-relaxed mb-6">Voda kape ze sifonu pod kuchyňskou linkou. Zkoušel jsem to dotáhnout, ale nepomohlo to. Potřebuji přetěsnit nebo vyměnit sifon.</p>
                                
                                <div id="offers-section" class="border-t border-slate-100 dark:border-slate-700 pt-6">
                                    <h5 class="font-bold text-sm text-slate-500 uppercase tracking-widest mb-4">Obdržené nabídky (2)</h5>
                                    
                                    <div class="bg-fixit-50 dark:bg-fixit-500/10 p-4 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-4 mb-3 border border-fixit-500">
                                        <div class="flex items-center gap-4 w-full sm:w-auto">
                                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Karel&backgroundColor=0f172a" class="w-12 h-12 rounded-full border-2 border-white">
                                            <div>
                                                <p class="font-extrabold flex items-center gap-2">Karel V. <span class="bg-white dark:bg-slate-800 text-yellow-500 px-2 py-0.5 rounded-md text-xs"><i class="fa-solid fa-star"></i> 4.9</span></p>
                                                <p class="text-sm text-slate-500 dark:text-slate-400">Může dorazit: <strong class="text-fixit-600 dark:text-fixit-400">Dnes v 15:30</strong></p>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
                                            <div class="text-right">
                                                <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">Cena celkem</p>
                                                <p class="font-black text-xl">1 200 Kč</p>
                                            </div>
                                            <button onclick="payEscrow()" class="bg-fixit-500 hover:bg-fixit-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transition hover:scale-105 whitespace-nowrap">Zaplatit do úschovy</button>
                                        </div>
                                    </div>

                                    <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-4 border border-slate-200 dark:border-slate-700">
                                        <div class="flex items-center gap-4">
                                            <div class="w-12 h-12 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-xl font-bold">P</div>
                                            <div>
                                                <p class="font-extrabold">Petr S. <span class="text-yellow-500 ml-1 text-sm"><i class="fa-solid fa-star"></i> 4.7</span></p>
                                                <p class="text-sm text-slate-500">Může dorazit: Zítra dopoledne</p>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
                                            <div class="text-right">
                                                <p class="text-xs text-slate-500 font-bold">Cena celkem</p>
                                                <p class="font-black text-xl text-slate-600 dark:text-slate-300">950 Kč</p>
                                            </div>
                                            <button class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 px-6 py-3 rounded-xl font-bold transition hover:bg-slate-50 dark:hover:bg-slate-700">Detail</button>
                                        </div>
                                    </div>
                                </div>

                                <div id="paid-section" class="hidden border-t border-slate-100 dark:border-slate-700 pt-6 text-center">
                                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4"><i class="fa-solid fa-check"></i></div>
                                    <h4 class="text-xl font-extrabold mb-2">Částka 1 200 Kč je v bezpečí Escrow</h4>
                                    <p class="text-slate-500 mb-6">Řemeslník Karel V. je na cestě. Až práci dokončí, potvrďte to zde.</p>
                                    <div class="flex gap-4 justify-center">
                                        <button onclick="switchTab('c-messages', 'Zprávy')" class="bg-slate-100 dark:bg-slate-800 px-6 py-3 rounded-xl font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition">Napsat zprávu</button>
                                        <button class="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 transition shadow-lg"><i class="fa-solid fa-check-double"></i> Potvrdit hotovou práci</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-fixit-dark text-white p-8 rounded-3xl relative overflow-hidden shadow-xl">
                                <i class="fa-solid fa-shield-halved absolute -bottom-4 -right-4 text-8xl text-fixit-500 opacity-20"></i>
                                <h3 class="font-extrabold text-xl mb-2 relative z-10 text-fixit-500">100% Escrow Ochrana</h3>
                                <p class="text-slate-300 text-sm leading-relaxed relative z-10 mb-4">Peníze strhneme z vaší karty, ale řemeslníkovi je pošleme až ve chvíli, kdy kliknete na "Potvrdit hotovou práci".</p>
                                <button onclick="switchTab('c-payments', 'Platby & Escrow')" class="w-full bg-white/10 hover:bg-white/20 text-white px-5 py-3 rounded-xl font-bold text-sm transition">Zobrazit moje platby</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="view-c-requests" class="view-section hidden">
                    <h2 class="text-3xl font-extrabold mb-6">Moje poptávky</h2>
                    <div id="my-requests-list" class="space-y-4">

        // --- 4. FUNKCE ZÁKAZNICKÉHO PORTÁLU ---
        function payEscrow() {
            const modal = document.getElementById('modal-payment-success');
            const box = document.getElementById('modal-payment-box');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-90');
            box.classList.add('scale-100');

            document.getElementById('offers-section').classList.add('hidden');
            document.getElementById('paid-section').classList.remove('hidden');
            document.getElementById('status-badge').innerText = "Oprava probíhá";
            document.getElementById('status-badge').className = "bg-fixit-100 text-fixit-600 dark:bg-fixit-500/20 dark:text-fixit-400 px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest";
            document.getElementById('escrow-balance').innerText = "1 200 Kč";
        }

        function closePaymentModal() {
            const modal = document.getElementById('modal-payment-success');
            const box = document.getElementById('modal-payment-box');
            modal.classList.add('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-100');
            box.classList.add('scale-90');
        }

        function simulateAI() {
            const input = document.getElementById('new-request-input');
            const text = input.value.trim();
            
            if (!text) {
                alert("Prosím, popište nejprve svou závadu.");
                input.focus();
                return;
            }

            const btn = document.getElementById('btn-ai-generate');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-microchip fa-spin"></i> Bořek analyzuje a tvoří zadání...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Poptávka zveřejněna!';
                btn.classList.replace('bg-slate-900', 'bg-green-500');
                btn.classList.replace('hover:bg-fixit-500', 'hover:bg-green-600');
                
                // Vytvoření názvu z textu uživatele (prvních 35 znaků)
                let generatedTitle = text.length > 35 ? text.substring(0, 35) + '...' : text;
                generatedTitle = generatedTitle.charAt(0).toUpperCase() + generatedTitle.slice(1);

                // Dynamické přidání poptávky do seznamu "Moje poptávky"
                const newRequestHTML = `
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-fixit-500 shadow-md flex items-center justify-between cursor-pointer transition animate-pulse">
                        <div>
                            <span class="bg-yellow-100 text-yellow-600 dark:bg-yellow-500/20 dark:text-yellow-400 px-2 py-0.5 rounded text-xs font-bold uppercase mr-2">Hledáme profíka</span>
                            <span class="font-bold text-lg">${generatedTitle}</span>
                            <p class="text-sm text-slate-500 mt-1">Vytvořeno: Právě teď • Čeká na nabídky</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-fixit-500"></i>
                    </div>
                `;
                
                const requestsList = document.getElementById('my-requests-list');
                if (requestsList) {
                    requestsList.insertAdjacentHTML('afterbegin', newRequestHTML);
                    // Zrušení pulse efektu po chvíli
                    setTimeout(() => { requestsList.firstElementChild.classList.remove('animate-pulse'); }, 2000);
                }

                setTimeout(() => {
                    // Reset formuláře
                    input.value = '';
                    btn.innerHTML = originalBtnHtml;
                    btn.classList.replace('bg-green-500', 'bg-slate-900');
                    btn.classList.replace('hover:bg-green-600', 'hover:bg-fixit-500');
                    btn.disabled = false;

                    // Přesměrování na "Moje poptávky"
                    switchTab('c-requests', 'Moje poptávky'); 
                }, 1500);
            }, 2000);
        }

        // --- DARK MODE ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const updateIcons = () => {
            const isDark = document.documentElement.classList.contains('dark');
            if(document.getElementById('theme-toggle-dark-icon')) {
                document.getElementById('theme-toggle-dark-icon').classList.toggle('hidden', isDark);
                document.getElementById('theme-toggle-light-icon').classList.toggle('hidden', !isDark);
            }
        };
        updateIcons();
        if(themeToggleBtn){
            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                updateIcons();
            });
        }
    </script>
