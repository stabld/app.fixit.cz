<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixit | Přihlášení (Napojeno na DB)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        fixit: { 50: '#fffbeb', 100: '#fef3c7', 500: '#f59e0b', 600: '#d97706', 700: '#b45309', dark: '#020617', slate: '#0f172a' }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="antialiased bg-slate-50 text-slate-900 dark:bg-fixit-dark dark:text-white min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-fixit-500/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden relative z-10">
        
        <div class="bg-slate-100 dark:bg-slate-800/50 p-2 flex relative border-b border-slate-200 dark:border-slate-800">
            <button onclick="switchAuthView('login')" id="btn-tab-login" class="flex-1 py-3 text-sm font-bold rounded-2xl transition-all z-10 text-slate-900 dark:text-white">Přihlášení</button>
            <button onclick="switchAuthView('register')" id="btn-tab-register" class="flex-1 py-3 text-sm font-bold rounded-2xl transition-all z-10 text-slate-500">Registrace</button>
            <div id="auth-slider" class="absolute top-2 left-2 w-[calc(50%-8px)] h-[calc(100%-16px)] bg-white dark:bg-slate-700 rounded-2xl shadow-sm transition-transform duration-300"></div>
        </div>

        <div class="p-8">
            <div class="flex justify-center mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 relative flex items-center justify-center">
                        <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none">
                            <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                            <circle cx="50" cy="48" r="16" class="fill-white dark:fill-slate-900"/>
                            <path d="M40 58 L30 68 L45 64 Z" class="fill-white dark:fill-slate-900"/>
                        </svg>
                    </div>
                    <span class="font-extrabold text-3xl tracking-tighter dark:text-white">Fixit</span>
                </div>
            </div>

            <div id="auth-error" class="hidden mb-4 p-4 bg-red-50 dark:bg-red-500/10 border border-red-500/20 text-red-600 dark:text-red-400 rounded-xl text-sm font-bold text-center">
                Chyba
            </div>

            <div id="auth-success" class="hidden mb-4 p-4 bg-green-50 dark:bg-green-500/10 border border-green-500/20 text-green-600 dark:text-green-400 rounded-xl text-sm font-bold text-center">
                Úspěch!
            </div>

            <div id="form-login">
                <h2 class="text-2xl font-extrabold text-center mb-6">Vítejte zpět 👋</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">E-mail</label>
                            <input type="email" id="log-email" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="vas@email.cz">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400">Heslo</label>
                                <a href="#" class="text-xs text-fixit-600 dark:text-fixit-500 font-bold hover:underline">Zapomenuté heslo?</a>
                            </div>
                            <input type="password" id="log-password" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" id="btn-submit-login" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-4 rounded-xl mt-6 transition shadow-lg hover:scale-[1.02]">
                        Přihlásit se
                    </button>
                </form>
            </div>

            <div id="form-register" class="hidden">
                <h2 class="text-2xl font-extrabold text-center mb-6">Vytvořit účet ✨</h2>
                <form onsubmit="handleRegister(event)">
                    
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-3 text-center">Jsem zde jako:</label>
                        <div class="grid grid-cols-2 gap-3">
                            <div onclick="selectRole('customer')" id="role-customer" class="cursor-pointer border-2 border-fixit-500 bg-fixit-50 dark:bg-fixit-500/10 rounded-xl p-4 text-center transition-all">
                                <i class="fa-solid fa-house-chimney-window text-2xl text-fixit-500 mb-2"></i>
                                <p class="font-bold text-sm text-slate-900 dark:text-white leading-tight">Hledám<br>řemeslníka</p>
                            </div>
                            <div onclick="selectRole('craftsman')" id="role-craftsman" class="cursor-pointer border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-fixit-500/50 rounded-xl p-4 text-center transition-all opacity-60 hover:opacity-100">
                                <i class="fa-solid fa-toolbox text-2xl text-slate-400 mb-2"></i>
                                <p class="font-bold text-sm text-slate-900 dark:text-white leading-tight">Jsem<br>řemeslník</p>
                            </div>
                        </div>
                        <input type="hidden" id="selected-role" value="customer">
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Jméno a příjmení</label>
                            <input type="text" id="reg-name" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="Jan Novák">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">E-mail</label>
                            <input type="email" id="reg-email" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="vas@email.cz">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Heslo (min. 6 znaků)</label>
                            <input type="password" id="reg-password" required minlength="6" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" id="btn-submit-register" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-4 rounded-xl mt-6 transition shadow-lg hover:scale-[1.02]">
                        Vytvořit účet
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // NASTAVENÍ SUPABASE (TADY VLOŽ SVÉ ÚDAJE!)
        // ==========================================
        const supabaseUrl = 'https://iyvvwsnhezjrjrkscbyc.supabase.co'; 
        const supabaseKey = 'sb_publishable_OehKo_l9qTAp-xfmlHpzOA_OYBp4ouc';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ==========================================
        // LOGIKA UI
        // ==========================================
        function switchAuthView(view) {
            document.getElementById('auth-error').classList.add('hidden');
            document.getElementById('auth-success').classList.add('hidden');

            const slider = document.getElementById('auth-slider');
            const btnLogin = document.getElementById('btn-tab-login');
            const btnRegister = document.getElementById('btn-tab-register');
            const formLogin = document.getElementById('form-login');
            const formRegister = document.getElementById('form-register');

            if (view === 'login') {
                slider.style.transform = 'translateX(0)';
                btnLogin.classList.remove('text-slate-500');
                btnLogin.classList.add('text-slate-900', 'dark:text-white');
                btnRegister.classList.add('text-slate-500');
                btnRegister.classList.remove('text-slate-900', 'dark:text-white');
                formLogin.classList.remove('hidden');
                formRegister.classList.add('hidden');
            } else {
                slider.style.transform = 'translateX(100%)';
                btnRegister.classList.remove('text-slate-500');
                btnRegister.classList.add('text-slate-900', 'dark:text-white');
                btnLogin.classList.add('text-slate-500');
                btnLogin.classList.remove('text-slate-900', 'dark:text-white');
                formRegister.classList.remove('hidden');
                formLogin.classList.add('hidden');
            }
        }

        function selectRole(role) {
            document.getElementById('selected-role').value = role;
            const boxCustomer = document.getElementById('role-customer');
            const boxCraftsman = document.getElementById('role-craftsman');

            if (role === 'customer') {
                boxCustomer.className = "cursor-pointer border-2 border-fixit-500 bg-fixit-50 dark:bg-fixit-500/10 rounded-xl p-4 text-center transition-all";
                boxCustomer.querySelector('i').className = "fa-solid fa-house-chimney-window text-2xl text-fixit-500 mb-2";
                boxCraftsman.className = "cursor-pointer border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-fixit-500/50 rounded-xl p-4 text-center transition-all opacity-60 hover:opacity-100";
                boxCraftsman.querySelector('i').className = "fa-solid fa-toolbox text-2xl text-slate-400 mb-2";
            } else {
                boxCraftsman.className = "cursor-pointer border-2 border-fixit-500 bg-fixit-50 dark:bg-fixit-500/10 rounded-xl p-4 text-center transition-all";
                boxCraftsman.querySelector('i').className = "fa-solid fa-toolbox text-2xl text-fixit-500 mb-2";
                boxCustomer.className = "cursor-pointer border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-fixit-500/50 rounded-xl p-4 text-center transition-all opacity-60 hover:opacity-100";
                boxCustomer.querySelector('i').className = "fa-solid fa-house-chimney-window text-2xl text-slate-400 mb-2";
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('auth-error');
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
            document.getElementById('auth-success').classList.add('hidden');
        }

        function showSuccess(msg) {
            const successBox = document.getElementById('auth-success');
            successBox.innerText = msg;
            successBox.classList.remove('hidden');
            document.getElementById('auth-error').classList.add('hidden');
        }

        // ==========================================
        // KOMUNIKACE S DATABÁZÍ SUPABASE
        // ==========================================

        // 1. REGISTRACE
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-register');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Vytvářím účet...';
            btn.disabled = true;

            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const name = document.getElementById('reg-name').value;
            const role = document.getElementById('selected-role').value;

            // Zápis do Supabase
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: name,
                        role: role
                    }
                }
            });

            btn.innerHTML = originalText;
            btn.disabled = false;

            if (error) {
                showError("Chyba při registraci: " + error.message);
            } else {
                showSuccess("Registrace byla úspěšná! Nyní se můžete přihlásit.");
                setTimeout(() => { switchAuthView('login'); }, 2000); // Přepne na okno přihlášení
            }
        }

        // 2. PŘIHLÁŠENÍ
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-login');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Přihlašuji...';
            btn.disabled = true;

            const email = document.getElementById('log-email').value;
            const password = document.getElementById('log-password').value;

            // Zápis do Supabase
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            btn.innerHTML = originalText;
            btn.disabled = false;

            if (error) {
                showError("Špatný e-mail nebo heslo.");
            } else {
                showSuccess("Úspěšně přihlášeno!");
                console.log("Uživatel přihlášen:", data.user);
                // ZDE POZDĚJI PŘIDÁME PŘESMĚROVÁNÍ DO APLIKACE
            }
        }
    </script>
</body>
</html>
