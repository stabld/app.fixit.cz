<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixit App | Klientský a Řemeslnický portál</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        fixit: { 
                            50: '#fffbeb', 100: '#fef3c7', 500: '#f59e0b', 
                            600: '#d97706', 700: '#b45309', dark: '#020617', slate: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .glass-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.2); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animace pro přechody obrazovek */
        .fade-enter { opacity: 0; transition: opacity 0.4s ease-in-out; }
        .fade-enter-active { opacity: 1; }
        .fade-exit { opacity: 1; transition: opacity 0.4s ease-in-out; }
        .fade-exit-active { opacity: 0; pointer-events: none; position: absolute; }
    </style>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }
    </script>
</head>
<body class="antialiased bg-slate-50 text-slate-900 dark:bg-fixit-dark dark:text-white h-screen overflow-hidden relative">

    <div id="auth-screen" class="absolute inset-0 z-[100] flex items-center justify-center bg-slate-50 dark:bg-fixit-dark p-4 fade-enter fade-enter-active">
        
        <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden relative">
            
            <div class="bg-slate-100 dark:bg-slate-800/50 p-2 flex relative border-b border-slate-200 dark:border-slate-800">
                <button onclick="switchAuthView('login')" id="btn-view-login" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all z-10 text-slate-900 dark:text-white">Přihlášení</button>
                <button onclick="switchAuthView('register')" id="btn-view-register" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all z-10 text-slate-500">Registrace</button>
                <div id="auth-slider" class="absolute top-2 left-2 w-[calc(50%-8px)] h-[calc(100%-16px)] bg-white dark:bg-slate-700 rounded-xl shadow-sm transition-transform duration-300"></div>
            </div>

            <div class="p-8">
                <div class="flex justify-center mb-8">
                    <div class="flex items-center gap-3">
                        <svg width="40" height="40" viewBox="0 0 100 100" fill="none">
                            <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                            <circle cx="50" cy="48" r="16" fill="white"/>
                            <path d="M40 58 L30 68 L45 64 Z" fill="white"/>
                        </svg>
                        <span class="font-extrabold text-3xl tracking-tighter dark:text-white">Fixit</span>
                    </div>
                </div>

                <div id="login-form">
                    <h2 class="text-2xl font-extrabold text-center mb-6">Vítejte zpět</h2>
                    <form onsubmit="handleAuth(event, 'login')">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">E-mail</label>
                                <input type="email" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="jan@novak.cz">
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400">Heslo</label>
                                    <a href="#" class="text-xs text-fixit-600 dark:text-fixit-500 font-bold hover:underline">Zapomenuté heslo?</a>
                                </div>
                                <input type="password" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="••••••••">
                            </div>
                        </div>
                        <button type="submit" id="btn-submit-login" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-4 rounded-xl mt-6 transition shadow-lg flex justify-center items-center gap-2">
                            <span>Přihlásit se</span>
                        </button>
                    </form>
                </div>

                <div id="register-form" class="hidden">
                    <h2 class="text-2xl font-extrabold text-center mb-6">Vytvořit účet</h2>
                    <form onsubmit="handleAuth(event, 'register')">
                        
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-3 text-center">Jsem zde jako:</label>
                            <div class="grid grid-cols-2 gap-3">
                                <div onclick="selectAccountType('customer')" id="type-customer" class="cursor-pointer border-2 border-fixit-500 bg-fixit-50 dark:bg-fixit-500/10 rounded-xl p-4 text-center transition-all">
                                    <i class="fa-solid fa-house text-2xl text-fixit-500 mb-2"></i>
                                    <p class="font-bold text-sm text-slate-900 dark:text-white">Hledám<br>řemeslníka</p>
                                </div>
                                <div onclick="selectAccountType('craftsman')" id="type-craftsman" class="cursor-pointer border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-fixit-500/50 rounded-xl p-4 text-center transition-all opacity-70 hover:opacity-100">
                                    <i class="fa-solid fa-tools text-2xl text-slate-400 mb-2"></i>
                                    <p class="font-bold text-sm text-slate-900 dark:text-white">Jsem<br>řemeslník</p>
                                </div>
                            </div>
                            <input type="hidden" id="account-type-input" value="customer">
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Jméno a příjmení</label>
                                <input type="text" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="Jan Novák">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">E-mail</label>
                                <input type="email" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="jan@novak.cz">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Heslo</label>
                                <input type="password" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="••••••••">
                            </div>
                        </div>
                        <button type="submit" id="btn-submit-register" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-4 rounded-xl mt-6 transition shadow-lg flex justify-center items-center gap-2">
                            <span>Vytvořit účet</span>
                        </button>
                    </form>
                </div>

                <div class="mt-8 flex items-center gap-4">
                    <div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nebo přes</span>
                    <div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
                </div>

                <div class="mt-6 grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 py-3 rounded-xl font-bold transition text-sm">
                        <i class="fa-brands fa-google text-red-500"></i> Google
                    </button>
                    <button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 py-3 rounded-xl font-bold transition text-sm">
                        <i class="fa-brands fa-apple text-slate-900 dark:text-white text-lg"></i> Apple
                    </button>
                </div>
            </div>
        </div>
    </div>


    <div id="main-app" class="flex h-screen w-full hidden fade-enter">
        <aside class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between flex-shrink-0 z-50">
            <div>
                <div class="h-20 flex items-center px-8 border-b border-slate-200 dark:border-slate-800 cursor-pointer">
                    <svg width="32" height="32" viewBox="0 0 100 100" fill="none" class="mr-3">
                        <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                        <circle cx="50" cy="48" r="16" fill="white"/>
                        <path d="M40 58 L30 68 L45 64 Z" fill="white"/>
                    </svg>
                    <span class="font-extrabold text-2xl tracking-tighter dark:text-white">Fixit</span>
                    <span class="ml-2 px-2 py-0.5 bg-fixit-500/10 text-fixit-500 text-[10px] font-black uppercase tracking-widest rounded-full">App</span>
                </div>

                <nav class="p-4 space-y-2 mt-4" id="main-nav">
                    </nav>
            </div>

            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <button onclick="logout()" class="w-full mb-4 px-4 py-2 rounded-xl text-sm font-bold text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Odhlásit se
                </button>

                <div class="flex items-center gap-3 w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold">
                    <div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center overflow-hidden shrink-0">
                        <img id="profile-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=f59e0b" alt="User">
                    </div>
                    <div class="text-left truncate">
                        <p class="text-sm text-slate-900 dark:text-white leading-tight truncate" id="user-name">Jan Novák</p>
                        <p class="text-xs font-normal truncate" id="user-type-label">Zákazník</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
            <header class="h-20 glass-panel flex items-center justify-between px-8 z-40 sticky top-0">
                <h1 class="text-2xl font-extrabold" id="page-title">Přehled</h1>
                <div class="flex items-center gap-4">
                    <button class="w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-500 transition relative">
                        <i class="fa-regular fa-bell text-xl"></i>
                        <span class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>
                    </button>
                    <button id="theme-toggle" class="w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-500 transition">
                        <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-xl"></i>
                        <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-xl"></i>
                    </button>
                    <button class="bg-fixit-500 hover:bg-fixit-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition hover:scale-105 text-sm flex items-center gap-2" id="header-cta">
                        <i class="fa-solid fa-plus"></i> Nová poptávka
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 hide-scroll pb-32" id="app-content">
                </div>
        </main>
    </div>

    <script>
        // ==========================================
        // 1. LOGIKA PŘIHLAŠOVÁNÍ A REGISTRACE
        // ==========================================
        
        let selectedRegisterRole = 'customer'; // Výchozí role při registraci

        // Přepínání záložek Login / Registrace
        function switchAuthView(view) {
            const slider = document.getElementById('auth-slider');
            const btnLogin = document.getElementById('btn-view-login');
            const btnRegister = document.getElementById('btn-view-register');
            const formLogin = document.getElementById('login-form');
            const formRegister = document.getElementById('register-form');

            if (view === 'login') {
                slider.style.transform = 'translateX(0)';
                btnLogin.classList.remove('text-slate-500');
                btnRegister.classList.add('text-slate-500');
                formLogin.classList.remove('hidden');
                formRegister.classList.add('hidden');
            } else {
                slider.style.transform = 'translateX(100%)';
                btnRegister.classList.remove('text-slate-500');
                btnLogin.classList.add('text-slate-500');
                formRegister.classList.remove('hidden');
                formLogin.classList.add('hidden');
            }
        }

        // Výběr typu účtu při registraci (Zákazník vs. Řemeslník)
        function selectAccountType(type) {
            selectedRegisterRole = type;
            document.getElementById('account-type-input').value = type;

            const boxCustomer = document.getElementById('type-customer');
            const boxCraftsman = document.getElementById('type-craftsman');

            if (type === 'customer') {
                boxCustomer.className = "cursor-pointer border-2 border-fixit-500 bg-fixit-50 dark:bg-fixit-500/10 rounded-xl p-4 text-center transition-all";
                boxCustomer.querySelector('i').className = "fa-solid fa-house text-2xl text-fixit-500 mb-2";
                
                boxCraftsman.className = "cursor-pointer border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-fixit-500/50 rounded-xl p-4 text-center transition-all opacity-70 hover:opacity-100";
                boxCraftsman.querySelector('i').className = "fa-solid fa-tools text-2xl text-slate-400 mb-2";
            } else {
                boxCraftsman.className = "cursor-pointer border-2 border-fixit-500 bg-fixit-50 dark:bg-fixit-500/10 rounded-xl p-4 text-center transition-all";
                boxCraftsman.querySelector('i').className = "fa-solid fa-tools text-2xl text-fixit-500 mb-2";
                
                boxCustomer.className = "cursor-pointer border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-fixit-500/50 rounded-xl p-4 text-center transition-all opacity-70 hover:opacity-100";
                boxCustomer.querySelector('i').className = "fa-solid fa-house text-2xl text-slate-400 mb-2";
            }
        }

        // Simulace odeslání formuláře a přechod do aplikace
        function handleAuth(e, actionType) {
            e.preventDefault(); // Zabrání znovunačtení stránky
            
            const btn = document.getElementById(actionType === 'login' ? 'btn-submit-login' : 'btn-submit-register');
            const originalText = btn.innerHTML;
            
            // Loading efekt
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Zpracovávám...';
            btn.disabled = true;

            setTimeout(() => {
                // Skrytí auth screenu a zobrazení aplikace
                const authScreen = document.getElementById('auth-screen');
                const mainApp = document.getElementById('main-app');
                
                authScreen.classList.replace('fade-enter-active', 'fade-exit-active');
                
                setTimeout(() => {
                    authScreen.classList.add('hidden');
                    mainApp.classList.remove('hidden');
                    // Krátké zpoždění pro plynulý fade-in aplikace
                    setTimeout(() => mainApp.classList.add('fade-enter-active'), 50);
                    
                    // Inicializace aplikace se správnou rolí
                    // Pokud se uživatel přihlašuje, nastavíme natvrdo 'customer' (pro ukázku)
                    // Pokud se registruje, použijeme tu roli, kterou si naklikal.
                    const roleToInit = actionType === 'register' ? selectedRegisterRole : 'customer';
                    initApp(roleToInit);
                    
                    // Reset tlačítek pro případné odhlášení
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    e.target.reset(); // Vymazání formuláře
                }, 400); // Počkat na dokončení fade-out animace
            }, 1000); // Simulace síťového volání na server
        }

        // Odhlášení
        function logout() {
            const authScreen = document.getElementById('auth-screen');
            const mainApp = document.getElementById('main-app');
            
            mainApp.classList.remove('fade-enter-active');
            
            setTimeout(() => {
                mainApp.classList.add('hidden');
                authScreen.classList.remove('hidden', 'fade-exit-active');
                authScreen.classList.add('fade-enter', 'fade-enter-active');
                // Přepneme zpět na login formulář
                switchAuthView('login');
            }, 400);
        }


        // ==========================================
        // 2. LOGIKA HLAVNÍ APLIKACE (DASHBOARD)
        // ==========================================
        
        let currentRole = 'customer';

        const navConfig = {
            customer: [
                { icon: 'fa-house', text: 'Nástěnka', active: true },
                { icon: 'fa-list-check', text: 'Moje poptávky' },
                { icon: 'fa-comment-dots', text: 'Zprávy' },
                { icon: 'fa-credit-card', text: 'Platby (Escrow)' }
            ],
            craftsman: [
                { icon: 'fa-map-location-dot', text: 'Tržiště zakázek', active: true },
                { icon: 'fa-hammer', text: 'Moje práce' },
                { icon: 'fa-comment-dots', text: 'Zprávy' },
                { icon: 'fa-wallet', text: 'Výdělky' },
                { icon: 'fa-id-card', text: 'Ověření profilu (KYC)' }
            ]
        };

        function renderNav() {
            const navEl = document.getElementById('main-nav');
            navEl.innerHTML = navConfig[currentRole].map(item => `
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl font-bold transition ${item.active ? 'bg-fixit-500/10 text-fixit-500 dark:bg-fixit-500/20' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white'}">
                    <i class="fa-solid ${item.icon} w-5 text-center ${item.active ? '' : 'opacity-70'}"></i>
                    ${item.text}
                </a>
            `).join('');
        }

        function renderCustomerDashboard() {
            return `
                <div class="mb-10">
                    <h2 class="text-3xl font-extrabold mb-2">Vítejte doma, Jane 👋</h2>
                    <p class="text-slate-500 dark:text-slate-400">Tady je přehled vašich aktuálních řešení.</p>
                </div>

                <div class="grid lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold text-xl uppercase tracking-widest text-slate-400 text-sm">Aktivní poptávka</h3>
                            <span class="bg-blue-100 text-blue-600 dark:bg-blue-500/20 dark:text-blue-400 px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest">Přijímáte nabídky</span>
                        </div>
                        
                        <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 border border-slate-200 dark:border-slate-700 shadow-sm relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-2 h-full bg-fixit-500"></div>
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <span class="text-fixit-500 font-bold text-sm uppercase tracking-widest mb-2 block">Instalatérství</span>
                                    <h4 class="text-2xl font-extrabold">Oprava protékajícího dřezu</h4>
                                </div>
                                <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=200&h=200" class="w-16 h-16 rounded-xl object-cover border border-slate-100">
                            </div>
                            <p class="text-slate-600 dark:text-slate-300 leading-relaxed mb-6">Voda kape ze sifonu pod kuchyňskou linkou. Zkoušel jsem to dotáhnout, ale nepomohlo to. Potřebuji přetěsnit nebo vyměnit sifon. Naléhavé, kape to na podlahu.</p>
                            
                            <div class="border-t border-slate-100 dark:border-slate-700 pt-6">
                                <h5 class="font-bold text-sm text-slate-500 uppercase tracking-widest mb-4">Obdržené nabídky (2)</h5>
                                
                                <div class="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-4 mb-3 border border-fixit-500/30">
                                    <div class="flex items-center gap-4">
                                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Karel&backgroundColor=0f172a" class="w-12 h-12 rounded-full">
                                        <div>
                                            <p class="font-extrabold">Karel V. <span class="text-yellow-500 ml-1"><i class="fa-solid fa-star"></i> 4.9</span></p>
                                            <p class="text-sm text-slate-500">Může dorazit: Dnes v 15:30</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4 w-full md:w-auto">
                                        <div class="text-right hidden md:block">
                                            <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">Cena</p>
                                            <p class="font-black text-xl">1 200 Kč</p>
                                        </div>
                                        <button class="w-full md:w-auto bg-fixit-500 hover:bg-fixit-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transition hover:scale-105">Vybrat a zaplatit</button>
                                    </div>
                                </div>

                                <div class="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-4 border border-slate-200 dark:border-slate-700">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-xl font-bold">P</div>
                                        <div>
                                            <p class="font-extrabold">Petr S. <span class="text-yellow-500 ml-1"><i class="fa-solid fa-star"></i> 4.7</span></p>
                                            <p class="text-sm text-slate-500">Může dorazit: Zítra dopoledne</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4 w-full md:w-auto">
                                        <div class="text-right hidden md:block">
                                            <p class="text-xs text-slate-500 font-bold">Cena</p>

        function initApp(role) {
            currentRole = role;
            
            if (role === 'customer') {
                document.getElementById('user-name').innerText = 'Jan Novák';
                document.getElementById('user-type-label').innerText = 'Zákazník';
                document.getElementById('profile-avatar').src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=f59e0b";
                document.getElementById('header-cta').innerHTML = '<i class="fa-solid fa-plus"></i> Nová poptávka';
                document.getElementById('page-title').innerText = 'Přehled';
            } else {
                document.getElementById('user-name').innerText = 'Karel (Instalatér)';
                document.getElementById('user-type-label').innerText = 'Řemeslník';
                document.getElementById('profile-avatar').src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Karel&backgroundColor=0f172a";
                document.getElementById('header-cta').innerHTML = '<i class="fa-solid fa-toggle-on"></i> Jsem online';
                document.getElementById('page-title').innerText = 'Tržiště';
            }

            renderNav();
            document.getElementById('app-content').innerHTML = role === 'customer' ? renderCustomerDashboard() : renderCraftsmanDashboard();
        }

        // ==========================================
        // 3. OSTATNÍ FUNKCE (Téma, Inicializace)
        // ==========================================

        const themeToggleBtn = document.getElementById('theme-toggle');
        const updateIcons = () => {
            const isDark = document.documentElement.classList.contains('dark');
            if(document.getElementById('theme-toggle-dark-icon')) {
                document.getElementById('theme-toggle-dark-icon').classList.toggle('hidden', isDark);
                document.getElementById('theme-toggle-light-icon').classList.toggle('hidden', !isDark);
            }
        };
        updateIcons();
        if(themeToggleBtn){
            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                updateIcons();
            });
        }
        
    </script>
