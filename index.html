<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixit App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { fixit: { 50:'#fffbeb',100:'#fef3c7',500:'#f59e0b',600:'#d97706',700:'#b45309',dark:'#020617',slate:'#0f172a' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); }
        .dark .glass-panel { background: rgba(15,23,42,0.9); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style:none; scrollbar-width:none; }
        .nav-item.active { background: rgba(245,158,11,0.12); color: #f59e0b; }
        .dark .nav-item.active { background: rgba(245,158,11,0.2); }
        .poptavka-bubble-user { background:#f59e0b; color:white; border-radius:18px 18px 2px 18px; padding:12px 20px; max-width:80%; align-self:flex-end; }
        .poptavka-bubble-ai { background:#f1f5f9; color:#0f172a; border-radius:18px 18px 18px 2px; padding:12px 20px; max-width:80%; align-self:flex-start; border:1px solid #e2e8f0; }
        .dark .poptavka-bubble-ai { background:#1e293b; color:#f8fafc; border-color:#334155; }
        .status-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
        .status-waiting { background:#fef3c7; color:#b45309; }
        .status-active { background:#dcfce7; color:#166534; }
        .status-done { background:#f1f5f9; color:#475569; }
        .dark .status-waiting { background:rgba(245,158,11,0.2); color:#fbbf24; }
        .dark .status-active { background:rgba(34,197,94,0.2); color:#4ade80; }
        .dark .status-done { background:rgba(100,116,139,0.2); color:#94a3b8; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fade-up { animation: fadeUp 0.35s ease forwards; }
        /* Mobile bottom nav */
        @media (max-width: 1023px) {
            #sidebar { display: none; }
            #mobile-bottom-nav { display: flex; }
            #main-content { padding-bottom: 80px; }
        }
        @media (min-width: 1024px) {
            #mobile-bottom-nav { display: none; }
        }
    </style>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }
    </script>
</head>
<body class="antialiased bg-slate-50 text-slate-900 dark:bg-fixit-dark dark:text-white h-screen overflow-hidden">

<!-- ==================== AUTH SCREEN ==================== -->
<div id="auth-screen" class="absolute inset-0 z-[100] flex items-center justify-center bg-slate-50 dark:bg-fixit-dark p-4">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-fixit-500/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-[100px]"></div>
    <div class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl border border-slate-200 dark:border-slate-800 p-8 md:p-12 relative z-10">
        <div class="flex justify-center items-center gap-3 mb-8">
            <svg width="48" height="48" viewBox="0 0 100 100" fill="none"><path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/><circle cx="50" cy="48" r="16" fill="white"/><path d="M40 58 L30 68 L45 64 Z" fill="white"/></svg>
            <span class="font-extrabold text-4xl tracking-tighter dark:text-white">Fixit</span>
        </div>
        <!-- ROLE SELECT -->
        <div id="view-role-select">
            <h2 class="text-2xl md:text-3xl font-extrabold mb-2 text-center dark:text-white">Vítejte v aplikaci</h2>
            <p class="text-slate-500 dark:text-slate-400 text-center mb-10 text-lg">Vyberte, jak chcete Fixit používat</p>
            <div class="grid md:grid-cols-2 gap-6">
                <button onclick="goToAuth('customer')" class="group bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-fixit-500 dark:hover:border-fixit-500 rounded-[2rem] p-8 flex flex-col items-center gap-4 transition-all hover:-translate-y-1 hover:shadow-xl text-center relative overflow-hidden">
                    <div class="w-20 h-20 bg-white dark:bg-slate-700 text-fixit-500 rounded-2xl flex items-center justify-center text-4xl group-hover:bg-fixit-500 group-hover:text-white transition-all shadow-sm">🏠</div>
                    <div>
                        <h3 class="font-extrabold text-xl text-slate-900 dark:text-white mb-2">Vstoupit jako poptávající</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">Potřebuji opravit něco doma a hledám ověřeného profíka.</p>
                    </div>
                </button>
                <button onclick="goToAuth('craftsman')" class="group bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-fixit-500 dark:hover:border-fixit-500 rounded-[2rem] p-8 flex flex-col items-center gap-4 transition-all hover:-translate-y-1 hover:shadow-xl text-center relative overflow-hidden">
                    <div class="w-20 h-20 bg-white dark:bg-slate-700 text-slate-400 group-hover:bg-fixit-500 group-hover:text-white transition-all rounded-2xl flex items-center justify-center text-3xl shadow-sm"><i class="fa-solid fa-toolbox"></i></div>
                    <div>
                        <h3 class="font-extrabold text-xl text-slate-900 dark:text-white mb-2">Vstoupit jako řemeslník</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">Jsem profík a chci získat přístup k novým zakázkám v okolí.</p>
                    </div>
                </button>
            </div>
        </div>
        <!-- AUTH FORM -->
        <div id="view-auth-form" class="hidden max-w-md mx-auto">
            <button onclick="backToRoles()" class="text-sm font-bold text-slate-500 hover:text-fixit-500 mb-5 flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Zpět</button>
            <div class="bg-fixit-50 dark:bg-fixit-500/10 border border-fixit-500/30 rounded-xl p-3 mb-6 flex items-center justify-center gap-2 text-fixit-700 dark:text-fixit-400 font-bold text-sm">
                <i id="role-icon" class="fa-solid fa-house"></i><span id="role-text">Zákazník</span>
            </div>
            <div class="bg-slate-100 dark:bg-slate-800 p-1.5 rounded-2xl flex relative mb-6">
                <button onclick="switchTab('login')" id="btn-login" class="flex-1 py-2.5 text-sm font-bold rounded-xl z-10 dark:text-white transition-colors">Přihlášení</button>
                <button onclick="switchTab('register')" id="btn-reg" class="flex-1 py-2.5 text-sm font-bold rounded-xl z-10 text-slate-500 transition-colors">Registrace</button>
                <div id="tab-slider" class="absolute top-1.5 left-1.5 w-[calc(50%-6px)] h-[calc(100%-12px)] bg-white dark:bg-slate-700 rounded-xl shadow-sm transition-transform duration-300"></div>
            </div>
            <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 dark:bg-red-500/10 border border-red-200 text-red-600 rounded-xl text-sm font-bold text-center"></div>
            <div id="auth-ok" class="hidden mb-4 p-3 bg-green-50 dark:bg-green-500/10 border border-green-200 text-green-600 rounded-xl text-sm font-bold text-center"></div>
            <!-- LOGIN -->
            <div id="form-login">
                <div class="space-y-3">
                    <input type="email" id="log-email" placeholder="E-mail" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none dark:text-white">
                    <input type="password" id="log-pass" placeholder="Heslo" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none dark:text-white">
                </div>
                <button onclick="doLogin()" id="btn-do-login" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-3.5 rounded-xl mt-4 transition shadow-lg">Přihlásit se</button>
            </div>
            <!-- REGISTER -->
            <div id="form-reg" class="hidden">
                <div class="space-y-3">
                    <input type="text" id="reg-name" placeholder="Jméno a příjmení" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none dark:text-white">
                    <input type="email" id="reg-email" placeholder="E-mail" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none dark:text-white">
                    <input type="password" id="reg-pass" placeholder="Heslo (min. 6 znaků)" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none dark:text-white">
                </div>
                <button onclick="doRegister()" id="btn-do-reg" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-3.5 rounded-xl mt-4 transition shadow-lg">Vytvořit účet</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== MAIN APP ==================== -->
<div id="main-app" class="hidden flex h-screen w-full">

    <!-- SIDEBAR (desktop) -->
    <aside id="sidebar" class="w-68 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between flex-shrink-0 z-50" style="width:272px">
        <div>
            <div class="h-20 flex items-center px-6 border-b border-slate-200 dark:border-slate-800">
                <svg width="36" height="36" viewBox="0 0 100 100" fill="none"><path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/><circle cx="50" cy="48" r="16" fill="white"/><path d="M40 58 L30 68 L45 64 Z" fill="white"/></svg>
                <span class="font-extrabold text-xl tracking-tighter ml-2.5 dark:text-white">Fixit</span>
                <span class="ml-2 px-2 py-0.5 bg-fixit-500/10 text-fixit-500 text-[10px] font-black uppercase tracking-widest rounded-full">App</span>
            </div>
            <nav class="p-3 space-y-1 mt-3" id="sidebar-nav"></nav>
        </div>
        <div class="p-4 border-t border-slate-200 dark:border-slate-800">
            <button onclick="doLogout()" class="w-full mb-3 px-4 py-2 rounded-xl text-sm font-bold text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition flex items-center justify-center gap-2"><i class="fa-solid fa-arrow-right-from-bracket"></i> Odhlásit se</button>
            <div class="flex items-center gap-3 p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700">
                <img id="user-avatar" src="" class="w-10 h-10 rounded-full bg-slate-200 shrink-0">
                <div class="truncate">
                    <p class="text-sm font-bold dark:text-white leading-tight truncate" id="user-name">Uživatel</p>
                    <p class="text-xs text-slate-500" id="user-role-lbl">Role</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 dark:bg-fixit-dark">
        <header class="h-16 glass-panel border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 z-40 flex-shrink-0">
            <h1 class="text-xl font-extrabold dark:text-white" id="page-title">Nástěnka</h1>
            <div class="flex items-center gap-3">
                <button id="theme-toggle" class="w-9 h-9 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center text-slate-500 transition">
                    <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-lg"></i>
                    <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-lg"></i>
                </button>
                <div id="header-cta"></div>
            </div>
        </header>
        <div id="main-content" class="flex-1 overflow-y-auto p-6 hide-scroll" id="views-wrap"></div>
    </main>

    <!-- MOBILE BOTTOM NAV -->
    <nav id="mobile-bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 z-50 hidden">
        <div id="bottom-nav-items" class="flex justify-around items-center h-16 px-2"></div>
    </nav>
</div>

<script>
// ========== SUPABASE ==========
const SB_URL = 'https://iyvvwsnhezjrjrkscbyc.supabase.co';
const SB_KEY = 'sb_publishable_OehKo_l9qTAp-xfmlHpzOA_OYBp4ouc';
let sb = null;
try { if (window.supabase) sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

let APP_ROLE = 'customer';
let APP_USER = null;
// In-memory state
let STATE = { requests: [], messages: [], payments: [], craftJobs: [], craftEarnings: 0 };

// ========== AUTH ==========
function goToAuth(role) {
    APP_ROLE = role;
    document.getElementById('role-icon').className = role === 'customer' ? 'fa-solid fa-house' : 'fa-solid fa-toolbox';
    document.getElementById('role-text').innerText = role === 'customer' ? 'Zákazník' : 'Řemeslník';
    document.getElementById('view-role-select').classList.add('hidden');
    document.getElementById('view-auth-form').classList.remove('hidden');
    switchTab('login'); clearMsg();
}
function backToRoles() {
    document.getElementById('view-auth-form').classList.add('hidden');
    document.getElementById('view-role-select').classList.remove('hidden');
    clearMsg();
}
function switchTab(t) {
    clearMsg();
    const slider = document.getElementById('tab-slider');
    document.getElementById('btn-login').classList.toggle('text-slate-500', t !== 'login');
    document.getElementById('btn-login').classList.toggle('dark:text-white', t === 'login');
    document.getElementById('btn-reg').classList.toggle('text-slate-500', t !== 'register');
    slider.style.transform = t === 'register' ? 'translateX(100%)' : 'translateX(0)';
    document.getElementById('form-login').classList.toggle('hidden', t !== 'login');
    document.getElementById('form-reg').classList.toggle('hidden', t !== 'register');
}
function showErr(m) { const e = document.getElementById('auth-error'); e.innerText = m; e.classList.remove('hidden'); document.getElementById('auth-ok').classList.add('hidden'); }
function showOk(m) { const e = document.getElementById('auth-ok'); e.innerText = m; e.classList.remove('hidden'); document.getElementById('auth-error').classList.add('hidden'); }
function clearMsg() { document.getElementById('auth-error').classList.add('hidden'); document.getElementById('auth-ok').classList.add('hidden'); }

async function doRegister() {
    if (!sb) return showErr("Chyba připojení k databázi.");
    const btn = document.getElementById('btn-do-reg');
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Vytvářím...'; btn.disabled = true;
    try {
        const { data, error } = await sb.auth.signUp({
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-pass').value,
            options: { data: { full_name: document.getElementById('reg-name').value, role: APP_ROLE } }
        });
        if (error) throw error;
        showOk("Účet vytvořen! Nyní se přihlaste.");
        setTimeout(() => switchTab('login'), 1800);
    } catch(e) { showErr("Chyba: " + e.message); }
    finally { btn.innerHTML = 'Vytvořit účet'; btn.disabled = false; }
}

async function doLogin() {
    if (!sb) return showErr("Chyba připojení k databázi.");
    const btn = document.getElementById('btn-do-login');
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Přihlašuji...'; btn.disabled = true;
    try {
        const { data, error } = await sb.auth.signInWithPassword({
            email: document.getElementById('log-email').value,
            password: document.getElementById('log-pass').value
        });
        if (error) throw error;
        showOk("Přihlášeno! Spouštím aplikaci...");
        APP_USER = data.user;
        const role = data.user.user_metadata?.role || APP_ROLE;
        const name = data.user.user_metadata?.full_name || 'Uživatel';
        setTimeout(() => launchApp(role, name), 900);
    } catch(e) { showErr("Špatný e-mail nebo heslo."); }
    finally { btn.innerHTML = 'Přihlásit se'; btn.disabled = false; }
}

async function doLogout() { if(sb) await sb.auth.signOut(); window.location.reload(); }

// ========== APP LAUNCH ==========
function launchApp(role, name) {
    document.getElementById('auth-screen').style.opacity = '0';
    document.getElementById('auth-screen').style.transition = 'opacity 0.4s';
    setTimeout(() => {
        document.getElementById('auth-screen').classList.add('hidden');
        const app = document.getElementById('main-app');
        app.classList.remove('hidden');
        app.style.opacity = '0';
        setTimeout(() => { app.style.transition = 'opacity 0.4s'; app.style.opacity = '1'; }, 50);
        initApp(role, name);
    }, 400);
}

function initApp(role, name) {
    document.getElementById('user-name').innerText = name;
    document.getElementById('user-role-lbl').innerText = role === 'customer' ? 'Zákazník' : 'Řemeslník';
    document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(name)}&backgroundColor=${role === 'customer' ? 'f59e0b' : '0f172a'}`;

    // Theme toggle
    const tt = document.getElementById('theme-toggle');
    const updateIcons = () => {
        const d = document.documentElement.classList.contains('dark');
        document.getElementById('theme-toggle-dark-icon').classList.toggle('hidden', d);
        document.getElementById('theme-toggle-light-icon').classList.toggle('hidden', !d);
    };
    updateIcons();
    tt.addEventListener('click', () => { document.documentElement.classList.toggle('dark'); localStorage.setItem('color-theme', document.documentElement.classList.contains('dark')?'dark':'light'); updateIcons(); });

    if (role === 'customer') initCustomer(name);
    else initCraftsman(name);
}

// ========== CUSTOMER APP ==========
function initCustomer(name) {
    const nav = [
        { id:'dash', icon:'fa-house', label:'Nástěnka' },
        { id:'requests', icon:'fa-list-check', label:'Moje poptávky' },
        { id:'messages', icon:'fa-comment-dots', label:'Zprávy' },
        { id:'payments', icon:'fa-shield-halved', label:'Platby & Escrow' },
    ];
    buildNav(nav, 'customer');
    document.getElementById('header-cta').innerHTML = `<button onclick="goTab('new','Nová poptávka')" class="bg-fixit-500 hover:bg-fixit-600 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 shadow transition hover:scale-105"><i class="fa-solid fa-plus"></i> Nová poptávka</button>`;
    document.getElementById('main-content').innerHTML = customerHTML(name);
    goTab('dash', 'Nástěnka');
}

function customerHTML(name) {
    const first = name.split(' ')[0];
    return `
    <!-- DASHBOARD -->
    <div id="view-dash" class="hidden fade-up">
        <div class="mb-8"><h2 class="text-2xl font-extrabold mb-1 dark:text-white">Vítejte, ${first} 👋</h2><p class="text-slate-500">Přehled vašich aktivit na platformě Fixit.</p></div>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Aktivní poptávky</p>
                <p class="text-3xl font-extrabold text-fixit-500" id="stat-active">0</p>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Celkem poptávek</p>
                <p class="text-3xl font-extrabold dark:text-white" id="stat-total">0</p>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Nepřečtené zprávy</p>
                <p class="text-3xl font-extrabold dark:text-white" id="stat-msgs">0</p>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">V Escrow</p>
                <p class="text-3xl font-extrabold dark:text-white" id="stat-escrow">0 Kč</p>
            </div>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-6 mb-4">
            <h3 class="font-extrabold mb-4 dark:text-white">Poslední poptávky</h3>
            <div id="dash-requests-list"><p class="text-slate-400 text-sm text-center py-6">Zatím žádné poptávky. <button onclick="goTab('new','Nová poptávka')" class="text-fixit-500 font-bold hover:underline">Vytvořit první →</button></p></div>
        </div>
    </div>

    <!-- MOJE POPTÁVKY -->
    <div id="view-requests" class="hidden fade-up">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-extrabold dark:text-white">Moje poptávky</h2>
            <button onclick="goTab('new','Nová poptávka')" class="bg-fixit-500 hover:bg-fixit-600 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 shadow"><i class="fa-solid fa-plus"></i> Nová</button>
        </div>
        <div id="requests-list" class="space-y-3">
            <div id="empty-req" class="text-center p-12 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl">
                <i class="fa-solid fa-folder-open text-4xl text-slate-300 dark:text-slate-600 mb-4"></i>
                <p class="font-bold text-slate-500">Zatím zde nic není.</p>
                <button onclick="goTab('new','Nová poptávka')" class="mt-4 text-fixit-500 font-bold hover:underline text-sm">Vytvořit první poptávku →</button>
            </div>

// ========== NAV ==========
function buildNav(items, role) {
    const sideHTML = items.map(item => `
        <button onclick="goTab('${item.id}','${item.label}')" id="nav-${item.id}" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 text-sm">
            <i class="fa-solid ${item.icon} w-5 text-center text-base"></i> ${item.label}
        </button>
    `).join('');
    document.getElementById('sidebar-nav').innerHTML = sideHTML;

    const bottomHTML = items.map(item => `
        <button onclick="goTab('${item.id}','${item.label}')" id="bnav-${item.id}" class="flex-1 flex flex-col items-center gap-1 py-2 text-slate-400 hover:text-fixit-500 transition">
            <i class="fa-solid ${item.icon} text-lg"></i>
            <span class="text-[10px] font-bold leading-tight">${item.label.split(' ')[0]}</span>
        </button>
    `).join('');
    document.getElementById('bottom-nav-items').innerHTML = bottomHTML;
}

function goTab(id, title) {
    document.querySelectorAll('.view-section, [id^="view-"]').forEach(el => {
        if(el.id && el.id.startsWith('view-')) { el.classList.add('hidden'); el.classList.remove('fade-up'); }
    });
    document.querySelectorAll('.nav-item').forEach(el => { el.classList.remove('active','text-slate-900','dark:text-white'); el.classList.add('text-slate-600','dark:text-slate-400'); });
    document.querySelectorAll('[id^="bnav-"]').forEach(el => { el.classList.remove('text-fixit-500'); el.classList.add('text-slate-400'); });

    const view = document.getElementById('view-' + id);
    if(view) { view.classList.remove('hidden'); void view.offsetWidth; view.classList.add('fade-up'); }

    const sideBtn = document.getElementById('nav-' + id);
    if(sideBtn) { sideBtn.classList.add('active','text-slate-900','dark:text-white'); sideBtn.classList.remove('text-slate-600','dark:text-slate-400'); }

    const botBtn = document.getElementById('bnav-' + id);
    if(botBtn) { botBtn.classList.remove('text-slate-400'); botBtn.classList.add('text-fixit-500'); }

    if(title) document.getElementById('page-title').innerText = title;
}

// ========== AI POPTÁVKA ==========
let poptHistoryText = '';
let poptBase64 = null;
let poptMime = null;

function handlePhoto(input) {
    const file = input.files[0];
    if (!file) return;
    poptMime = file.type;
    const reader = new FileReader();
    reader.onload = e => {
        const prev = document.getElementById('photo-preview');
        const zone = document.getElementById('photo-zone');
        prev.src = e.target.result; prev.classList.remove('hidden');
        poptBase64 = e.target.result.split(',')[1];
        zone.querySelector('i').classList.add('hidden'); zone.querySelector('p').classList.add('hidden');
    };
    reader.readAsDataURL(file);
}

function appendChat(role, text) {
    const box = document.getElementById('popt-chat-msgs');
    const d = document.createElement('div');
    if(role === 'user') { d.className = 'poptavka-bubble-user text-sm font-medium leading-relaxed'; d.innerText = text; }
    else { d.className = 'poptavka-bubble-ai text-sm leading-relaxed flex items-start gap-3'; d.innerHTML = `<div class="w-8 h-8 bg-fixit-500 rounded-full flex items-center justify-center text-white shrink-0 mt-0.5"><i class="fa-solid fa-hard-hat text-xs"></i></div><div>${text}</div>`; }
    box.appendChild(d); box.scrollTop = box.scrollHeight;
}

async function callAPI(parts, systemPrompt, useJson) {
    const isLocal = ['127.0.0.1','localhost'].includes(window.location.hostname) || window.location.protocol === 'file:';
    if(isLocal) {
        await new Promise(r => setTimeout(r, 1500));
        if(useJson) return JSON.stringify(parts.length <= 1 ? {status:"question",message:"Popište mi problém podrobněji – kde přesně je závada a jak dlouho to trvá?"} : {status:"done",nazev:"Testovací poptávka",kategorie:"Ukázka",popis:"Lokální testovací režim.",nalehavost:"Nízká",odhad_ceny:"0 Kč",rada:"Toto je ukázka lokálního módu."});
        return "Jsem Bořek v testovacím módu. Na ostrém Vercelu budu plně funkční!";
    }
    const res = await fetch('/api/gemini', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({parts,systemPrompt,useJson}) });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'API chyba');
    return data.text;
}

async function processPopt(text) {
    const loading = document.getElementById('popt-loading');
    const replyArea = document.getElementById('popt-reply-area');
    const result = document.getElementById('popt-result');
    loading.classList.remove('hidden'); replyArea.classList.add('hidden');

    const sp = `Jsi Bořek, profesionální technik. Vytvoř zadání pro řemeslníka.
ODPOVÍDEJ PŘESNĚ V TOMTO JSON FORMÁTU BEZ DALŠÍHO TEXTU:
{"status":"question","message":"otázka"} nebo {"status":"done","nazev":"titulek","kategorie":"obor","popis":"popis","nalehavost":"Vysoká/Střední/Nízká","odhad_ceny":"cena Kč","rada":"rada"}`;

    let parts = [{text}];
    if(poptBase64 && poptMime) parts.push({inlineData:{mimeType:poptMime,data:poptBase64}});

    try {
        const raw = await callAPI(parts, sp, true);
        let clean = raw.replace(/```json/gi,'').replace(/```/g,'').trim();
        const s = clean.indexOf('{'); const e = clean.lastIndexOf('}');
        if(s !== -1 && e !== -1) clean = clean.substring(s, e+1);
        const d = JSON.parse(clean);
        loading.classList.add('hidden');
        if(d.status === 'question') { appendChat('ai', d.message.replace(/[*✨⭐]/g,'')); replyArea.classList.remove('hidden'); document.getElementById('popt-reply').focus(); }
        else if(d.status === 'done') {
            document.getElementById('r-nazev').innerText = d.nazev.replace(/[*✨⭐]/g,'');
            document.getElementById('r-kat').innerText = d.kategorie.replace(/[*✨⭐]/g,'');
            document.getElementById('r-nal').innerText = d.nalehavost.replace(/[*✨⭐]/g,'');
            document.getElementById('r-cena').innerText = d.odhad_ceny.replace(/[*✨⭐]/g,'');
            document.getElementById('r-popis').innerText = d.popis.replace(/[*✨⭐]/g,'');
            if(d.rada && d.rada.trim()) { document.getElementById('popt-tip-text').innerText = d.rada.replace(/[*✨⭐]/g,''); document.getElementById('popt-tip').classList.remove('hidden'); }
            result.classList.remove('hidden');
        }
    } catch(err) { loading.classList.add('hidden'); replyArea.classList.remove('hidden'); if(err.message !== 'Local env') alert('Chyba API: ' + err.message); }
}

function startAI() {
    const txt = document.getElementById('popt-input').value.trim();
    if(!txt && !poptBase64) { alert('Popište závadu nebo nahrajte fotku.'); return; }
    document.getElementById('popt-form').classList.add('hidden');
    document.getElementById('popt-chat').classList.remove('hidden');
    poptHistoryText = txt || 'Posílám fotografii k analýze.';
    appendChat('user', poptHistoryText);
    processPopt(poptHistoryText);
}

function replyAI() {
    const inp = document.getElementById('popt-reply');
    const txt = inp.value.trim();
    if(!txt) return;
    appendChat('user', txt);
    poptHistoryText += '\nUpřesnění: ' + txt;
    inp.value = '';
    processPopt(poptHistoryText);
}

function publishRequest() {
    const title = document.getElementById('r-nazev').innerText;
    const kat = document.getElementById('r-kat').innerText;
    const popis = document.getElementById('r-popis').innerText;
    const now = new Date().toLocaleTimeString('cs', {hour:'2-digit',minute:'2-digit'});

    STATE.requests.unshift({ title, kat, popis, time: now, status: 'waiting' });
    refreshRequestsList();
    refreshDashboard();

    // Reset form
    poptHistoryText = ''; poptBase64 = null; poptMime = null;
    document.getElementById('popt-input').value = '';
    document.getElementById('popt-chat-msgs').innerHTML = '';
    document.getElementById('photo-preview').classList.add('hidden');
    document.getElementById('photo-zone').querySelector('i').classList.remove('hidden');
    document.getElementById('photo-zone').querySelector('p').classList.remove('hidden');
    document.getElementById('popt-result').classList.add('hidden');
    document.getElementById('popt-tip').classList.add('hidden');
    document.getElementById('popt-chat').classList.add('hidden');
    document.getElementById('popt-form').classList.remove('hidden');

    goTab('requests', 'Moje poptávky');
    setTimeout(() => { const first = document.querySelector('#requests-list .req-card'); if(first) first.classList.add('ring-2','ring-fixit-500'); setTimeout(() => first && first.classList.remove('ring-2','ring-fixit-500'), 2000); }, 100);
}

function refreshRequestsList() {
    const list = document.getElementById('requests-list');
    if(!list) return;
    const empty = document.getElementById('empty-req');
    if(STATE.requests.length === 0) { if(empty) empty.classList.remove('hidden'); return; }
    if(empty) empty.classList.add('hidden');
    const cards = list.querySelectorAll('.req-card');
    cards.forEach(c => c.remove());
    STATE.requests.forEach((req, i) => {
        const statusMap = { waiting:'Hledáme profíka', active:'Probíhá oprava', done:'Dokončeno' };
        const badgeMap = { waiting:'status-waiting', active:'status-active', done:'status-done' };
        const div = document.createElement('div');
        div.className = 'req-card bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 hover:border-fixit-500 hover:shadow-md transition fade-up';
        div.innerHTML = `
            <div class="flex items-center justify-between mb-2">
                <h4 class="font-extrabold dark:text-white truncate mr-3">${req.title}</h4>
                <span class="status-badge ${badgeMap[req.status]} shrink-0">${statusMap[req.status]}</span>
            </div>
            <p class="text-sm text-slate-500 mb-3">${req.kat} • ${req.time}</p>
            <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed line-clamp-2">${req.popis}</p>
            <div class="flex gap-2 mt-4">
                <button class="flex-1 text-xs font-bold py-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-fixit-500 hover:text-white transition">Zobrazit nabídky</button>
                <button onclick="markDone(${i})" class="text-xs font-bold py-2 px-3 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-500 hover:border-green-500 hover:text-green-600 transition">Označit hotovo</button>
            </div>`;
        list.insertBefore(div, list.querySelector('#empty-req'));
    });
}

function markDone(i) {
    STATE.requests[i].status = 'done';
    refreshRequestsList();
    refreshDashboard();
}

function refreshDashboard() {
    const statActive = document.getElementById('stat-active');
    const statTotal = document.getElementById('stat-total');
    const dashList = document.getElementById('dash-requests-list');
    if(statActive) statActive.innerText = STATE.requests.filter(r => r.status !== 'done').length;
    if(statTotal) statTotal.innerText = STATE.requests.length;
    if(dashList && STATE.requests.length > 0) {
        dashList.innerHTML = STATE.requests.slice(0,3).map(r => `
            <div class="flex items-center gap-3 py-3 border-b border-slate-100 dark:border-slate-700 last:border-0">
                <div class="w-8 h-8 bg-fixit-50 dark:bg-fixit-500/20 text-fixit-500 rounded-xl flex items-center justify-center text-sm shrink-0"><i class="fa-solid fa-clipboard"></i></div>
                <div class="flex-1 min-w-0"><p class="font-bold text-sm dark:text-white truncate">${r.title}</p><p class="text-xs text-slate-500">${r.kat} • ${r.time}</p></div>
                <span class="status-badge ${r.status === 'done' ? 'status-done' : 'status-waiting'} shrink-0 text-[10px]">${r.status === 'done' ? 'Hotovo' : 'Čeká'}</span>
            </div>
        `).join('');
    }
}

// ========== ZPRÁVY ==========
let activeChatId = null;
let conversations = {};

function sendMsg() {
    const inp = document.getElementById('msg-input');
    const txt = inp.value.trim();
    if(!txt || !activeChatId) return;
    if(!conversations[activeChatId]) conversations[activeChatId] = [];
    conversations[activeChatId].push({ from:'me', text:txt, time: new Date().toLocaleTimeString('cs',{hour:'2-digit',minute:'2-digit'}) });
    inp.value = '';
    renderChat('chat-msgs', activeChatId);
    // Auto reply simulation
    setTimeout(() => {
        conversations[activeChatId].push({ from:'other', text:'Díky za zprávu! Brzy se ozvu.', time: new Date().toLocaleTimeString('cs',{hour:'2-digit',minute:'2-digit'}) });
        renderChat('chat-msgs', activeChatId);
    }, 1200);
}

function sendMsgC() {
    const inp = document.getElementById('msg-input-c');
    if(inp) { const ev = { target: inp }; }
    sendMsg();
}

function renderChat(containerId, chatId) {
    const box = document.getElementById(containerId);
    if(!box || !conversations[chatId]) return;
    box.innerHTML = conversations[chatId].map(m => `
        <div class="flex ${m.from==='me'?'justify-end':'justify-start'}">
            <div class="max-w-[70%] px-4 py-2.5 rounded-2xl text-sm ${m.from==='me'?'bg-fixit-500 text-white':'bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-white'}">
                <p>${m.text}</p><p class="text-[10px] opacity-60 mt-1 ${m.from==='me'?'text-right':''}">${m.time}</p>
            </div>
        </div>
    `).join('');
    box.scrollTop = box.scrollHeight;
}

// ========== CRAFTSMAN ACTIONS ==========
function applyJob(btn, title) {
    btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i>Nabídka odeslána!';
    btn.className = btn.className.replace('bg-fixit-500 hover:bg-fixit-600', 'bg-green-500');
    btn.disabled = true;
    STATE.craftJobs.push({ title, status:'pending', time: new Date().toLocaleTimeString('cs',{hour:'2-digit',minute:'2-digit'}) });
    const cnt = document.getElementById('jobs-active-count');
    if(cnt) cnt.innerText = STATE.craftJobs.length;
    // Add to jobs list
    const jobsList = document.getElementById('my-jobs-list');
    if(jobsList) {
        const empty = jobsList.querySelector('.text-center');
        if(empty) empty.remove();
        const d = document.createElement('div');
        d.className = 'bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 fade-up';
        d.innerHTML = `
            <div class="flex items-center justify-between">
                <div><h4 class="font-bold dark:text-white text-sm">${title}</h4><p class="text-xs text-slate-500 mt-0.5">Nabídka odeslána</p></div>
                <span class="status-badge status-waiting">Čekám</span>
            </div>`;
        jobsList.prepend(d);
    }
}

function filterMarket(kat) {
    document.querySelectorAll('.filter-btn').forEach(b => { b.className = b.className.replace('bg-fixit-500 text-white shadow','bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300'); });
    event.target.className = event.target.className.replace('bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300','bg-fixit-500 text-white shadow');
    document.querySelectorAll('.market-item').forEach(item => {
        item.style.display = (kat === 'all' || item.dataset.kat === kat) ? '' : 'none';
    });
}
