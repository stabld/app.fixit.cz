<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixit App | Vstup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        fixit: { 
                            50: '#fffbeb', 100: '#fef3c7', 500: '#f59e0b', 
                            600: '#d97706', 700: '#b45309', dark: '#020617', slate: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        
        .glass-panel { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.85); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .view-transition { transition: opacity 0.4s ease, transform 0.4s ease; }
        .view-hidden { opacity: 0; transform: translateY(10px); pointer-events: none; position: absolute; width: 100%; z-index: -1; }
        .view-active { opacity: 1; transform: translateY(0); position: relative; z-index: 10; }
        
        .fade-enter { opacity: 0; transition: opacity 0.3s ease-in-out; }
        .fade-enter-active { opacity: 1; }
        
        .nav-item.active { background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .dark .nav-item.active { background-color: rgba(245, 158, 11, 0.2); }
        
        .poptavka-bubble-user { background-color:#f59e0b; color:white; border-radius:18px 18px 2px 18px; padding:12px 20px; max-width:80%; align-self:flex-end; box-shadow:0 4px 6px rgba(245,158,11,0.2); }
        .poptavka-bubble-ai { background-color:#f1f5f9; color:#0f172a; border-radius:18px 18px 18px 2px; padding:12px 20px; max-width:80%; align-self:flex-start; border:1px solid #e2e8f0; }
        .dark .poptavka-bubble-ai { background-color:#1e293b; color:#f8fafc; border-color:#334155; }
    </style>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }
    </script>
</head>
<body class="antialiased bg-slate-50 text-slate-900 dark:bg-fixit-dark dark:text-white h-screen overflow-hidden relative">

    <div id="auth-screen" class="absolute inset-0 z-[100] flex items-center justify-center bg-slate-50 dark:bg-fixit-dark p-4 transition-opacity duration-700">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-fixit-500/20 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl border border-slate-200 dark:border-slate-800 p-8 md:p-12 relative z-10 overflow-hidden">
            <div class="flex justify-center items-center gap-3 mb-8">
                <div class="w-14 h-14 relative flex items-center justify-center">
                    <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none">
                        <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                        <circle cx="50" cy="48" r="16" class="fill-white dark:fill-slate-900"/>
                        <path d="M40 58 L30 68 L45 64 Z" class="fill-white dark:fill-slate-900"/>
                    </svg>
                </div>
                <span class="font-extrabold text-4xl tracking-tighter text-slate-900 dark:text-white">Fixit</span>
            </div>

            <div class="relative">
                <div id="view-role-select" class="view-transition view-active">
                    <h2 class="text-2xl md:text-3xl font-extrabold mb-2 text-center text-slate-900 dark:text-white">Vítejte v aplikaci</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-center mb-10 text-lg">Vyberte, jak chcete Fixit používat</p>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <button onclick="window.goToAuth('customer')" class="group bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-fixit-500 dark:hover:border-fixit-500 rounded-[2rem] p-8 flex flex-col items-center gap-4 transition-all hover:-translate-y-1 hover:shadow-xl text-center relative overflow-hidden">
                            <div class="w-20 h-20 bg-white dark:bg-slate-700 text-fixit-500 rounded-2xl flex items-center justify-center text-3xl group-hover:bg-fixit-500 group-hover:text-white transition-all shadow-sm"><i class="fa-solid fa-house-chimney-window"></i></div>
                            <div>
                                <h3 class="font-extrabold text-xl text-slate-900 dark:text-white mb-2">Vstoupit jako poptávající</h3>
                                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">Potřebuji opravit něco doma a hledám ověřeného profíka.</p>
                            </div>
                        </button>
                        <button onclick="window.goToAuth('craftsman')" class="group bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-fixit-500 dark:hover:border-fixit-500 rounded-[2rem] p-8 flex flex-col items-center gap-4 transition-all hover:-translate-y-1 hover:shadow-xl text-center relative overflow-hidden">
                            <div class="w-20 h-20 bg-white dark:bg-slate-700 text-slate-400 group-hover:bg-fixit-500 group-hover:text-white transition-all rounded-2xl flex items-center justify-center text-3xl shadow-sm"><i class="fa-solid fa-toolbox"></i></div>
                            <div>
                                <h3 class="font-extrabold text-xl text-slate-900 dark:text-white mb-2">Vstoupit jako řemeslník</h3>
                                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">Jsem profík a chci získat přístup k novým zakázkám v okolí.</p>
                            </div>
                        </button>
                    </div>
                </div>

                <div id="view-auth-form" class="view-transition view-hidden max-w-md mx-auto">
                    <button onclick="window.goBackToRoles()" class="text-sm font-bold text-slate-500 hover:text-fixit-500 transition mb-6 flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Zpět na výběr</button>

                    <div class="bg-fixit-50 dark:bg-fixit-500/10 border border-fixit-500/30 rounded-xl p-4 mb-6 flex items-center justify-center gap-3 text-fixit-700 dark:text-fixit-400 font-bold">
                        <i id="selected-role-icon" class="fa-solid fa-house"></i>
                        <span id="selected-role-text">Přihlašujete se jako Zákazník</span>
                    </div>

                    <div class="bg-slate-100 dark:bg-slate-800 p-1.5 rounded-2xl flex relative mb-8">
                        <button onclick="window.switchAuthTab('login')" id="btn-tab-login" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all z-10 text-slate-900 dark:text-white">Přihlášení</button>
                        <button onclick="window.switchAuthTab('register')" id="btn-tab-register" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all z-10 text-slate-500">Registrace</button>
                        <div id="auth-slider" class="absolute top-1.5 left-1.5 w-[calc(50%-6px)] h-[calc(100%-12px)] bg-white dark:bg-slate-700 rounded-xl shadow-sm transition-transform duration-300"></div>
                    </div>

                    <div id="auth-error" class="hidden mb-4 p-4 bg-red-50 dark:bg-red-500/10 border border-red-500/20 text-red-600 dark:text-red-400 rounded-xl text-sm font-bold text-center"></div>
                    <div id="auth-success" class="hidden mb-4 p-4 bg-green-50 dark:bg-green-500/10 border border-green-500/20 text-green-600 dark:text-green-400 rounded-xl text-sm font-bold text-center"></div>

                    <div id="form-login">
                        <form onsubmit="window.handleLogin(event)">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">E-mail</label>
                                    <input type="email" id="log-email" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="vas@email.cz">
                                </div>
                                <div>
                                    <input type="password" id="log-password" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="••••••••">
                                </div>
                            </div>
                            <button type="submit" id="btn-submit-login" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-4 rounded-xl mt-6 transition shadow-lg hover:scale-[1.02]">Přihlásit se</button>
                        </form>
                    </div>

                    <div id="form-register" class="hidden">
                        <form onsubmit="window.handleRegister(event)">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Jméno a příjmení / Název firmy</label>
                                    <input type="text" id="reg-name" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="Jan Novák">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">E-mail</label>
                                    <input type="email" id="reg-email" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="vas@email.cz">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Heslo (min. 6 znaků)</label>
                                    <input type="password" id="reg-password" required minlength="6" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-fixit-500 outline-none transition" placeholder="••••••••">
                                </div>
                            </div>
                            <button type="submit" id="btn-submit-register" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white font-bold py-4 rounded-xl mt-6 transition shadow-lg hover:scale-[1.02]">Vytvořit účet</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="flex h-screen w-full hidden opacity-0 transition-opacity duration-500">
        <aside class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between flex-shrink-0 z-50">
            <div>
                <div class="h-20 flex items-center px-8 border-b border-slate-200 dark:border-slate-800 cursor-pointer">
                    <div class="w-10 h-10 relative flex items-center justify-center mr-3">
                        <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none">
                            <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#f59e0b"/>
                            <circle cx="50" cy="48" r="16" class="fill-white dark:fill-slate-900"/>
                            <path d="M40 58 L30 68 L45 64 Z" class="fill-white dark:fill-slate-900"/>
                        </svg>
                    </div>
                    <span class="font-extrabold text-2xl tracking-tighter dark:text-white">Fixit</span>
                    <span class="ml-2 px-2 py-0.5 bg-fixit-500/10 text-fixit-500 text-[10px] font-black uppercase tracking-widest rounded-full">App</span>
                </div>
                <nav class="p-4 space-y-2 mt-4" id="main-nav"></nav>
            </div>
            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <button onclick="window.logout()" class="w-full mb-4 px-4 py-2 rounded-xl text-sm font-bold text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition flex items-center justify-center gap-2"><i class="fa-solid fa-arrow-right-from-bracket"></i> Odhlásit se</button>
                <div class="flex items-center gap-3 w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700">
                    <div class="w-10 h-10 rounded-full bg-fixit-100 overflow-hidden shrink-0"><img id="user-avatar" src="" alt="User"></div>
                    <div class="text-left truncate">
                        <p class="text-sm font-bold text-slate-900 dark:text-white leading-tight" id="user-name">Jan Novák</p>
                        <p class="text-xs text-slate-500 font-medium" id="user-role-label">Zákazník</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden relative bg-slate-50 dark:bg-fixit-dark">
            <header class="h-20 glass-panel flex items-center justify-between px-8 z-40 sticky top-0">
                <h1 class="text-2xl font-extrabold" id="header-title">Nástěnka</h1>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center text-slate-500 transition"><i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-xl"></i><i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-xl"></i></button>
                    <div id="header-cta-container"></div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-8 hide-scroll pb-32 relative" id="views-container"></div>
        </main>
    </div>

    <script>
        // ==========================================
        // 1. SUPABASE
        // ==========================================
        const supabaseUrl = 'https://iyvvwsnhezjrjrkscbyc.supabase.co'; 
        const supabaseKey = 'sb_publishable_OehKo_l9qTAp-xfmlHpzOA_OYBp4ouc';
        let supabaseClient = null;
        try { if (window.supabase) supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey); } catch (e) { console.error("Chyba Supabase:", e); }

        // ==========================================
        // 2. AUTH LOGIKA
        // ==========================================
        window.activeRole = 'customer'; 
        window.goToAuth = function(role) {
            window.activeRole = role; 
            const iconEl = document.getElementById('selected-role-icon');
            const textEl = document.getElementById('selected-role-text');
            if(role === 'customer') {
                iconEl.className = 'fa-solid fa-house-chimney-window'; textEl.innerText = 'Pokračujete jako Zákazník';
            } else {
                iconEl.className = 'fa-solid fa-toolbox'; textEl.innerText = 'Pokračujete jako Řemeslník';
            }
            document.getElementById('view-role-select').classList.replace('view-active', 'view-hidden');
            document.getElementById('view-auth-form').classList.replace('view-hidden', 'view-active');
            window.clearMessages(); window.switchAuthTab('login');
        };

        window.goBackToRoles = function() {
            document.getElementById('view-auth-form').classList.replace('view-active', 'view-hidden');
            document.getElementById('view-role-select').classList.replace('view-hidden', 'view-active');
            window.clearMessages();
        };

        window.switchAuthTab = function(tab) {
            window.clearMessages();
            const slider = document.getElementById('auth-slider');
            const btnLogin = document.getElementById('btn-tab-login');
            const btnRegister = document.getElementById('btn-tab-register');
            const formLogin = document.getElementById('form-login');
            const formRegister = document.getElementById('form-register');

            if (tab === 'login') {
                slider.style.transform = 'translateX(0)';
                btnLogin.classList.add('text-slate-900', 'dark:text-white'); btnLogin.classList.remove('text-slate-500');
                btnRegister.classList.add('text-slate-500'); btnRegister.classList.remove('text-slate-900', 'dark:text-white');
                formLogin.classList.remove('hidden'); formRegister.classList.add('hidden');
            } else {
                slider.style.transform = 'translateX(100%)';
                btnRegister.classList.add('text-slate-900', 'dark:text-white'); btnRegister.classList.remove('text-slate-500');
                btnLogin.classList.add('text-slate-500'); btnLogin.classList.remove('text-slate-900', 'dark:text-white');
                formRegister.classList.remove('hidden'); formLogin.classList.add('hidden');
            }
        };

        window.showError = function(msg) {
            const box = document.getElementById('auth-error'); box.innerText = msg; box.classList.remove('hidden');
            document.getElementById('auth-success').classList.add('hidden');
        };

        window.showSuccess = function(msg) {
            const box = document.getElementById('auth-success'); box.innerText = msg; box.classList.remove('hidden');
            document.getElementById('auth-error').classList.add('hidden');
        };

        window.clearMessages = function() {
            document.getElementById('auth-error').classList.add('hidden'); document.getElementById('auth-success').classList.add('hidden');
        };

        window.handleRegister = async function(e) {
            e.preventDefault(); window.clearMessages();
            if (!supabaseClient) return window.showError("Nepodařilo se připojit k databázi.");
            const btn = document.getElementById('btn-submit-register'); const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Vytvářím účet...'; btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: document.getElementById('reg-email').value, password: document.getElementById('reg-password').value,
                    options: { data: { full_name: document.getElementById('reg-name').value, role: window.activeRole } }
                });
                if (error) throw error;
                window.showSuccess("Registrace byla úspěšná! Nyní se přihlaste.");
                setTimeout(() => { window.switchAuthTab('login'); }, 2000);
            } catch (err) { window.showError("Chyba při registraci: " + err.message); } finally { btn.innerHTML = originalText; btn.disabled = false; }
        };

        window.handleLogin = async function(e) {
            e.preventDefault(); window.clearMessages();
            if (!supabaseClient) return window.showError("Nepodařilo se připojit k databázi.");
            const btn = document.getElementById('btn-submit-login'); const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Přihlašuji...'; btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: document.getElementById('log-email').value, password: document.getElementById('log-password').value,
                });
                if (error) throw error;

                window.showSuccess("Úspěšně přihlášeno! Spouštím aplikaci...");
                const userRole = data.user.user_metadata?.role || 'customer';
                const userName = data.user.user_metadata?.full_name || 'Uživatel';
                
                setTimeout(() => {
                    const authScreen = document.getElementById('auth-screen'); const mainApp = document.getElementById('main-app');
                    authScreen.style.opacity = '0';
                    setTimeout(() => {
                        authScreen.classList.add('hidden'); window.initApp(userRole, userName);
                        mainApp.classList.remove('hidden'); void mainApp.offsetWidth; mainApp.style.opacity = '1';
                    }, 500);
                }, 1000);
            } catch (err) { window.showError("Špatný e-mail nebo heslo."); } finally { btn.innerHTML = originalText; btn.disabled = false; }
        };

        window.logout = async function() { if(supabaseClient) await supabaseClient.auth.signOut(); window.location.reload(); };

        // ==========================================
        // 3. LOGIKA APP A STRUKTURA
        // ==========================================
        const appStructure = {
            customer: {
                nav: [
                    { id: 'c-dashboard', icon: 'fa-house', text: 'Nástěnka' },
                    { id: 'c-requests', icon: 'fa-list-check', text: 'Moje poptávky' },
                    { id: 'c-messages', icon: 'fa-comment-dots', text: 'Zprávy' },
                    { id: 'c-payments', icon: 'fa-shield-halved', text: 'Platby & Escrow' },
                    { id: 'c-new', icon: 'fa-plus', text: 'Nová poptávka', hidden: true }
                ],
                roleLabel: 'Zákazník',
                cta: `<button onclick="window.switchAppTab('c-new', 'Nová poptávka')" class="bg-fixit-500 hover:bg-fixit-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition hover:scale-105 text-sm flex items-center gap-2"><i class="fa-solid fa-plus"></i> Nová poptávka</button>`
            },
            craftsman: {
                nav: [
                    { id: 'r-market', icon: 'fa-map-location-dot', text: 'Tržiště zakázek' },
                    { id: 'r-jobs', icon: 'fa-hammer', text: 'Moje práce' },
                    { id: 'r-messages', icon: 'fa-comment-dots', text: 'Zprávy' },
                    { id: 'r-earnings', icon: 'fa-wallet', text: 'Výdělky' }
                ],
                roleLabel: 'Řemeslník',
                cta: `<div class="bg-green-100 text-green-600 dark:bg-green-500/20 dark:text-green-400 px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2"><i class="fa-solid fa-toggle-on"></i> Jsem online</div>`
            }
        };

        window.initApp = function(role, name) {
            const config = appStructure[role];
            document.getElementById('user-name').innerText = name;
            document.getElementById('user-role-label').innerText = config.roleLabel;
            document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${name.replace(/\s+/g, '')}&backgroundColor=${role === 'customer' ? 'f59e0b' : '0f172a'}`;
            document.getElementById('header-cta-container').innerHTML = config.cta;

            const navHtml = config.nav.filter(item => !item.hidden).map(item => `
                <button onclick="window.switchAppTab('${item.id}', '${item.text}')" id="nav-${item.id}" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold transition hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
                    <i class="fa-solid ${item.icon} w-5 text-center"></i> ${item.text}
                </button>
            `).join('');
            document.getElementById('main-nav').innerHTML = navHtml;
            document.getElementById('views-container').innerHTML = role === 'customer' ? window.getCustomerHTML(name) : window.getCraftsmanHTML();
            window.switchAppTab(config.nav[0].id, config.nav[0].text);
        };

        window.switchAppTab = function(tabId, title) {
            document.querySelectorAll('.view-section').forEach(el => { el.classList.add('hidden'); el.classList.remove('fade-enter-active'); });
            document.querySelectorAll('.nav-item').forEach(el => { el.classList.remove('active', 'text-slate-900', 'dark:text-white'); el.classList.add('text-slate-600', 'dark:text-slate-400'); });
            const activeView = document.getElementById(`view-${tabId}`);
            if(activeView) { activeView.classList.remove('hidden'); setTimeout(() => activeView.classList.add('fade-enter-active'), 10); }
            const activeNav = document.getElementById(`nav-${tabId}`);
            if (activeNav) { activeNav.classList.add('active', 'text-slate-900', 'dark:text-white'); activeNav.classList.remove('text-slate-600', 'dark:text-slate-400'); }
            if(title) document.getElementById('header-title').innerText = title;
        };

        window.getCustomerHTML = function(name) {

                            <div class="w-16 h-16 rounded-full bg-fixit-500 flex items-center justify-center text-white shadow-inner flex-shrink-0"><i class="fa-solid fa-hard-hat text-2xl"></i></div>
                            <div><h3 class="text-2xl font-extrabold mb-1 text-slate-900 dark:text-white">Asistent Bořek</h3><p class="text-fixit-600 dark:text-fixit-500 text-sm font-bold uppercase tracking-widest">Příprava zakázky</p></div>

                                </div>
                                <div class="flex flex-col gap-3">
                                    <label class="font-bold text-slate-700 dark:text-slate-300">Přiložte fotku (volitelné)</label>
                                    <div class="relative group h-full min-h-[140px]">
                                        <input type="file" id="poptavka-photo" accept="image/*" onchange="window.handlePhotoUpload(this)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                                        <div id="poptavka-preview-zone" class="w-full h-full border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-2xl flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 group-hover:border-fixit-500 transition shadow-sm overflow-hidden relative">
                                            <i class="fa-solid fa-camera text-4xl mb-3 text-slate-400"></i><p class="text-lg text-slate-500 dark:text-slate-400 font-medium px-4">Nahrát fotku závady</p>
                                            <img id="poptavka-photo-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button onclick="window.startAIAnalysis()" id="poptavka-btn" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 hover:bg-fixit-500 dark:hover:bg-fixit-500 hover:text-white font-black py-6 rounded-2xl text-xl transition-all shadow-xl mt-4">Analyzovat problém</button>
                        </div>

                        <div id="poptavka-chat-box" class="hidden flex flex-col gap-6 relative z-10">
                            <div id="poptavka-chat-messages" class="flex flex-col gap-4 max-h-[500px] overflow-y-auto p-6 bg-slate-50 dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-inner"></div>
                            <div id="poptavka-reply-area" class="flex gap-4 hidden mt-2">
                                <input type="text" id="poptavka-reply-input" onkeypress="if(event.key === 'Enter') window.replyAI()" class="flex-grow bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-full pl-6 pr-4 py-4 focus:ring-2 focus:ring-fixit-500 outline-none text-lg shadow-sm" placeholder="Odpovězte asistentovi...">
                                <button onclick="window.replyAI()" id="poptavka-reply-btn" class="bg-fixit-500 hover:bg-fixit-600 text-white px-8 py-4 rounded-full font-bold shadow-md hover:scale-105 transition">Odeslat</button>
                            </div>
                        </div>

                        <div id="poptavka-loading" class="hidden mt-12 text-center text-slate-500 relative z-10">
                            <i class="fa-solid fa-microchip fa-spin text-4xl text-fixit-500 mb-6"></i><p class="font-bold text-xl">Bořek analyzuje data...</p>
                        </div>

                        <div id="poptavka-result" class="hidden mt-12 pt-12 border-t border-slate-200 dark:border-slate-700 relative z-10">
                            <div id="poptavka-rada-box" class="mb-10 bg-fixit-50 dark:bg-fixit-500/10 border border-fixit-500 rounded-2xl p-6 shadow-sm hidden">
                                <div class="flex items-start gap-4">

                                    <div><h4 class="text-slate-900 dark:text-white font-extrabold mb-2 uppercase tracking-widest text-sm">Bořkova rychlá rada</h4><p id="pop-rada" class="text-lg text-slate-800 dark:text-slate-200 leading-relaxed"></p></div>
                                </div>
                            </div>
                            <div class="flex items-center gap-4 mb-8">
                                <div class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xl shadow-sm"><i class="fa-solid fa-check"></i></div>
                                <h3 class="text-2xl font-extrabold text-slate-900 dark:text-white">Dokonalá poptávka je na světě!</h3>
                            </div>
                            <div class="bg-slate-50 dark:bg-slate-900 rounded-3xl p-8 border border-slate-200 dark:border-slate-700 shadow-sm relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-2 h-full bg-fixit-500"></div>
                                <div class="flex flex-wrap gap-4 mb-6">
                                    <span id="pop-kategorie" class="bg-fixit-100 text-fixit-700 dark:bg-fixit-500/20 dark:text-fixit-400 px-4 py-2 rounded-full font-bold text-sm uppercase tracking-widest">Kategorie</span>
                                    <span id="pop-nalehavost" class="bg-red-100 text-red-600 dark:bg-red-500/20 dark:text-red-400 px-4 py-2 rounded-full font-bold text-sm uppercase tracking-widest">Naléhavost</span>
                                    <span id="pop-cena" class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 px-4 py-2 rounded-full font-bold text-sm uppercase tracking-widest border border-slate-200 dark:border-slate-700">Cena</span>
                                </div>
                                <h4 id="pop-nazev" contenteditable="true" class="text-3xl font-extrabold mb-4 focus:outline-none focus:ring-2 focus:ring-fixit-500 rounded-xl px-2 py-1 -mx-2 hover:bg-white dark:hover:bg-slate-800 transition cursor-text border border-transparent">...</h4>
                                <h5 class="font-bold text-lg text-slate-500 mb-3 uppercase tracking-widest">Detailní popis pro řemeslníka</h5>
                                <p id="pop-popis" contenteditable="true" class="text-lg text-slate-700 dark:text-slate-300 leading-loose whitespace-pre-line focus:outline-none focus:ring-2 focus:ring-fixit-500 rounded-xl px-2 py-1 -mx-2 hover:bg-white dark:hover:bg-slate-800 transition cursor-text border border-transparent">...</p>
                                
                                <div class="mt-8 pt-8 border-t border-slate-200 dark:border-slate-700 text-center">
                                    <button onclick="window.publishAIRequest()" class="w-full bg-fixit-500 hover:bg-fixit-600 text-white px-10 py-5 rounded-2xl font-bold text-xl transition-transform hover:scale-105 shadow-xl">Zveřejnit poptávku na Fixit</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        window.getCraftsmanHTML = function() {
            return `
                <div id="view-r-market" class="view-section hidden"><div class="bg-white dark:bg-slate-800 rounded-3xl p-12 text-center"><h3 class="text-2xl font-extrabold">Žádné nové zakázky</h3></div></div>
                <div id="view-r-jobs" class="view-section hidden"></div><div id="view-r-messages" class="view-section hidden"></div><div id="view-r-earnings" class="view-section hidden"></div>
            `;
        };

        // ==========================================
        // 4. BOŘEK AI: LOGIKA VOLÁNÍ API (Z tvého webu)
        // ==========================================
        window.poptavkaHistoryText = "";
        window.currentBase64Image = null;
        window.currentMimeType = null;

        window.handlePhotoUpload = function(input) {
            const file = input.files[0];
            if (file) {
                window.currentMimeType = file.type;
                const reader = new FileReader();
                reader.onload = e => {
                    const preview = document.getElementById('poptavka-photo-preview');
                    const zone = document.getElementById('poptavka-preview-zone');
                    preview.src = e.target.result; preview.classList.remove('hidden');
                    window.currentBase64Image = e.target.result.split(',')[1];
                    zone.querySelector('i').classList.add('hidden'); zone.querySelector('p').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        window.appendPoptavkaChat = function(role, text) {
            const chatMessages = document.getElementById('poptavka-chat-messages');
            const msg = document.createElement('div');
            if (role === 'user') {
                msg.className = 'poptavka-bubble-user text-lg leading-relaxed shadow-sm font-medium';
                msg.innerText = text;
            } else {
                msg.className = 'poptavka-bubble-ai text-lg leading-relaxed shadow-sm flex items-start gap-4';
                msg.innerHTML = `<div class="w-10 h-10 rounded-full bg-fixit-500 flex items-center justify-center text-white shrink-0 mt-1"><i class="fa-solid fa-hard-hat"></i></div><div>${text}</div>`;
            }
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };

        // FUNKCE PRO VOLÁNÍ TVÉHO VERCEL API (api/gemini)
        window.callGeminiAPI = async function(parts, systemPrompt, useJson = false) {
            // Kontrola jestli to běží na lokálu nebo Vercelu
            const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' || window.location.protocol === 'file:';
            if (isLocal) {
                alert("Jste na lokálním počítači. Pro otestování plného AI API musíte aplikaci nahrát na Vercel (kde máte napojené to api/gemini).");
                throw new Error("Local env");
            }
            
            const response = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ parts, systemPrompt, useJson })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || `HTTP chyba: ${response.status}`);
            return data.text;
        };

        window.processPoptavka = async function(text) {
            const loading = document.getElementById('poptavka-loading');
            const replyArea = document.getElementById('poptavka-reply-area');
            const resultArea = document.getElementById('poptavka-result');
            const btnInitial = document.getElementById('poptavka-btn');
            const btnReply = document.getElementById('poptavka-reply-btn');
            
            if (btnInitial) btnInitial.disabled = true;
            if (btnReply) btnReply.disabled = true;
            loading.classList.remove('hidden');
            replyArea.classList.add('hidden');
            
            const systemPrompt = `Jsi Bořek, profesionální technik. Vytvoř zadání pro řemeslníka.
ODPOVÍDEJ PŘESNĚ V TOMTO JSON FORMÁTU BEZ DALŠÍHO TEXTU KOLEM:
Pokud se ptáš na detaily: {"status": "question", "message": "tvoje otázka"}
Pokud máš vše: {"status": "done", "nazev": "titulek", "kategorie": "obor", "popis": "detailní popis", "nalehavost": "Vysoká/Střední/Nízká", "odhad_ceny": "cena Kč", "rada": "krátká rada"}`;
            
            let parts = [{ text: text }];
            if (window.currentBase64Image && window.currentMimeType) {
                parts.push({ inlineData: { mimeType: window.currentMimeType, data: window.currentBase64Image } });
            }
            
            try {
                const responseText = await window.callGeminiAPI(parts, systemPrompt, true);
                
                let cleanText = responseText.replace(/```json/gi, '').replace(/```/g, '').trim();
                if (cleanText.indexOf('{') !== -1 && cleanText.lastIndexOf('}') !== -1) {
                    cleanText = cleanText.substring(cleanText.indexOf('{'), cleanText.lastIndexOf('}') + 1);
                }
                const data = JSON.parse(cleanText);
                
                loading.classList.add('hidden');
                
                if (data.status === "question") {
                    window.appendPoptavkaChat('ai', data.message.replace(/[\*✨⭐]/g, ''));
                    replyArea.classList.remove('hidden');
                    document.getElementById('poptavka-reply-input').focus();
                } else if (data.status === "done") {
                    document.getElementById('pop-nazev').innerText = data.nazev.replace(/[\*✨⭐]/g, '');
                    document.getElementById('pop-kategorie').innerText = data.kategorie.replace(/[\*✨⭐]/g, '');
                    document.getElementById('pop-popis').innerText = data.popis.replace(/[\*✨⭐]/g, '');
                    document.getElementById('pop-nalehavost').innerText = data.nalehavost.replace(/[\*✨⭐]/g, '');
                    document.getElementById('pop-cena').innerText = data.odhad_ceny.replace(/[\*✨⭐]/g, '');
                    if (data.rada && data.rada.trim()) {
                        document.getElementById('pop-rada').innerText = data.rada.replace(/[\*✨⭐]/g, '');
                        document.getElementById('poptavka-rada-box').classList.remove('hidden');
                    }
                    resultArea.classList.remove('hidden');
                    replyArea.classList.add('hidden');
                }
            } catch (e) {
                loading.classList.add('hidden');
                if(e.message !== "Local env") alert(`Došlo k chybě připojení na API: ${e.message}\nZkuste to prosím znovu.`);
                replyArea.classList.remove('hidden');
            } finally {
                if (btnInitial) btnInitial.disabled = false;
                if (btnReply) btnReply.disabled = false;
            }
        };

        window.startAIAnalysis = function() {
            const input = document.getElementById('poptavka-input');
            const text = input.value.trim();
            if (!text && !window.currentBase64Image) { alert("Prosím, popište závadu nebo nahrajte fotku."); input.focus(); return; }

            document.getElementById('poptavka-initial-form').classList.add('hidden');
            document.getElementById('poptavka-chat-box').classList.remove('hidden');
            
            window.poptavkaHistoryText = text || "Posílám fotografii k analýze.";
            window.appendPoptavkaChat('user', window.poptavkaHistoryText);
            window.processPoptavka(window.poptavkaHistoryText);
        };

        window.replyAI = function() {
            const input = document.getElementById('poptavka-reply-input');
            const text = input.value.trim();
            if (!text) return;
            
            window.appendPoptavkaChat('user', text);
            window.poptavkaHistoryText += `\nUpřesnění od uživatele: ${text}`;
            input.value = '';
            window.processPoptavka(window.poptavkaHistoryText);
        };

        window.publishAIRequest = function() {
            const finalTitle = document.getElementById('pop-nazev').innerText;
            const finalCat = document.getElementById('pop-kategorie').innerText;
            
            const newRequestHTML = `
                <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-fixit-500 shadow-md flex items-center justify-between cursor-pointer transition animate-pulse">
                    <div>
                        <span class="bg-yellow-100 text-yellow-600 dark:bg-yellow-500/20 dark:text-yellow-400 px-2 py-0.5 rounded text-xs font-bold uppercase mr-2">Hledáme profíka</span>
                        <span class="font-bold text-lg">${finalTitle}</span>
                        <p class="text-sm text-slate-500 mt-1">${finalCat} • Vytvořeno: Právě teď • Čeká na nabídky</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-fixit-500"></i>
                </div>
            `;
            
            const requestsList = document.getElementById('my-requests-list');
            const emptyMsg = document.getElementById('empty-requests-msg');
            
            if (requestsList) {
                if (emptyMsg) emptyMsg.style.display = 'none';
                requestsList.insertAdjacentHTML('afterbegin', newRequestHTML);
                setTimeout(() => { requestsList.firstElementChild.classList.remove('animate-pulse'); }, 2000);
            }

            window.poptavkaHistoryText = "";
            window.currentBase64Image = null;
            document.getElementById('poptavka-input').value = '';
            document.getElementById('poptavka-chat-messages').innerHTML = '';
            document.getElementById('poptavka-photo-preview').classList.add('hidden');
            document.getElementById('poptavka-preview-zone').querySelector('i').classList.remove('hidden');
            document.getElementById('poptavka-preview-zone').querySelector('p').classList.remove('hidden');
            document.getElementById('poptavka-result').classList.add('hidden');
            document.getElementById('poptavka-chat-box').classList.add('hidden');
            document.getElementById('poptavka-initial-form').classList.remove('hidden');

            window.switchAppTab('c-requests', 'Moje poptávky'); 
        };

        const themeToggleBtn = document.getElementById('theme-toggle');
        const updateIcons = () => {
            const isDark = document.documentElement.classList.contains('dark');
            if(document.getElementById('theme-toggle-dark-icon')) {
                document.getElementById('theme-toggle-dark-icon').classList.toggle('hidden', isDark);
                document.getElementById('theme-toggle-light-icon').classList.toggle('hidden', !isDark);
            }
        };
        updateIcons();
        if(themeToggleBtn){
            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                updateIcons();
            });
        }
    </script>
</body>
